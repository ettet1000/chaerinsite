<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼 투 뤤드</title>
    <style>
        :root { --p: #ff9a9e; --pd: #ff7675; --txt: #5d4037; --lcd-bg: #fdf5e6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; -webkit-user-select: none; }
        #main-container { position: relative; height: 98vh; aspect-ratio: 673 / 1024; background: url('toy_device.jpg') no-repeat center center; background-size: contain; }
        #game-screen { position: absolute; top: 35.2%; left: 28.8%; width: 42.4%; height: 34.5%; background-color: var(--lcd-bg); z-index: 10; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; border-radius: 4px; }
        
        .view { display: none; width: 100%; height: 100%; padding: 6px; box-sizing: border-box; flex-direction: column; }
        .view.active { display: flex; }
        .btn { width: 100%; padding: 8px 0; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 10px; margin-bottom: 4px; }
        .btn-primary { background: linear-gradient(135deg, var(--p), var(--pd)); color: white; }
        .btn-sub { background: #8d6e63; color: white; margin-top: auto; }

        /* 게임 UI */
        .canvas-holder { position: relative; width: 100%; flex-grow: 1; background: #fff; border-radius: 6px; overflow: hidden; border: 1.5px solid #ffcad4; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        .ui-row { display: flex; justify-content: space-between; font-size: 9px; font-weight: 900; color: var(--pd); padding-bottom: 2px; }
        .touch-pad { width: 100%; height: 35px; background: rgba(0,0,0,0.05); margin-top: 4px; border-radius: 6px; border: 1px dashed var(--pd); display: flex; align-items: center; justify-content: center; font-size: 8px; color: var(--pd); touch-action: none; cursor: pointer; }
        .game-ov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }

        /* 모달 및 갤러리 */
        #modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--lcd-bg); z-index: 2000; display: none; flex-direction: column; padding: 10px; box-sizing: border-box; }
        #modal-content { flex-grow: 1; background: #fff; border-radius: 8px; padding: 10px; font-size: 9px; overflow-y: auto; white-space: pre-wrap; border: 1px solid #ddd; }
        #gal-wrap { display: flex; width: 100%; height: 100%; transition: transform 0.3s ease-out; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="game-screen">
        <div id="view-home" class="view active">
            <div style="text-align:center; padding: 10px 0;"><img src="bunny.png" style="width: 35px;"><h3>채린x토루 월드</h3></div>
            <button class="btn btn-primary" onclick="nav('view-gallery')">🖼 사진 앨범</button>
            <button class="btn btn-primary" onclick="nav('view-lesson')">📚 수업 자료</button>
            <button class="btn btn-primary" onclick="nav('view-game-menu')">🎮 미니 게임</button>
        </div>

        <div id="view-gallery" class="view" style="padding:0;">
            <div id="gal-wrap" onclick="nextSl()">
                <img src="1.jpg" style="min-width:100%; width:100%; object-fit:cover;">
                <img src="2.jpg" style="min-width:100%; width:100%; object-fit:cover;">
                <img src="3.jpg" style="min-width:100%; width:100%; object-fit:cover;">
            </div>
            <button class="btn btn-sub" style="position:absolute; bottom:5px; left:5px; width:40px; padding:4px; font-size:7px;" onclick="nav('view-home')">닫기</button>
        </div>

        <div id="view-g1" class="view"><div class="ui-row"><span id="l1">❤️❤️❤️</span><span id="s1">0</span></div><div class="canvas-holder"><canvas id="c1"></canvas><div id="ov1" class="game-ov"><button class="btn btn-primary" onclick="initG1()">시작</button></div></div><div class="touch-pad" id="pad1">스와이프하여 토끼 이동</div><button class="btn btn-sub" onclick="nav('view-game-menu')">나가기</button></div>
        <div id="view-g2" class="view"><div class="ui-row"><span id="l2">❤️❤️❤️</span><span id="s2">0</span></div><div class="canvas-holder"><canvas id="c2"></canvas><div id="ov2" class="game-ov"><button class="btn btn-primary" onclick="initG2()">시작</button></div></div><div class="touch-pad" onmousedown="jump2()" ontouchstart="jump2()">터치하여 점프!</div><button class="btn btn-sub" onclick="nav('view-game-menu')">나가기</button></div>
        <div id="view-g3" class="view"><div class="ui-row"><span id="l3">찾기</span><span id="s3">0/3</span></div><div class="canvas-holder"><canvas id="c3"></canvas><div id="ov3" class="game-ov"><button class="btn btn-primary" onclick="initG3()">시작</button></div></div><button class="btn btn-sub" onclick="nav('view-game-menu')">나가기</button></div>
        <div id="view-g4" class="view"><div class="ui-row"><span id="l4">❤️❤️❤️</span><span id="s4">0</span></div><div class="canvas-holder"><canvas id="c4"></canvas><div id="ov4" class="game-ov"><button class="btn btn-primary" onclick="initG4()">시작</button></div></div><button class="btn btn-sub" onclick="nav('view-game-menu')">나가기</button></div>

        <div id="view-lesson" class="view">
            <h3 style="text-align:center; font-size:11px;">📚 수업 자료</h3>
            <div id="lesson-items" style="flex-grow:1; overflow-y:auto;">
                <button class="btn btn-primary" style="background:#fff; color:#333; border:1px solid #eee;" onclick="fetchText('1.txt')">수업 내용 1</button>
                <button class="btn btn-primary" style="background:#fff; color:#333; border:1px solid #eee;" onclick="fetchText('2.txt')">수업 내용 2</button>
                <button class="btn btn-primary" style="background:#fff; color:#333; border:1px solid #eee;" onclick="fetchText('3.txt')">수업 내용 3</button>
                <button class="btn btn-primary" style="background:#fff; color:#333; border:1px solid #eee;" onclick="fetchText('4.txt')">수업 내용 4</button>
            </div>
            <button class="btn btn-sub" onclick="nav('view-home')">홈으로</button>
        </div>

        <div id="view-game-menu" class="view">
            <h3 style="text-align:center; font-size:11px;">챌린지 선택</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                <button class="btn btn-primary" onclick="nav('view-g1')">❤️ 하트</button>
                <button class="btn btn-primary" onclick="nav('view-g2')">🥕 점프</button>
                <button class="btn btn-primary" onclick="nav('view-g3')">🔍 찾기</button>
                <button class="btn btn-primary" onclick="nav('view-g4')">🫧 방울</button>
            </div>
            <button class="btn btn-sub" onclick="nav('view-home')">홈으로</button>
        </div>

        <div id="modal">
            <div id="modal-content"></div>
            <button class="btn btn-primary" style="margin-top:8px;" onclick="closeModal()">닫기</button>
        </div>
    </div>
</div>

<script>
    let active = false, loop = null, itv = null, score = 0, life = 3;
    const imgBunny = new Image(); imgBunny.src = 'bunny.png';
    const imgHeart = new Image(); imgHeart.src = 'hearts.png';
    const imgCarrot = new Image(); imgCarrot.src = 'carrot.png';
    const imgWater = new Image(); imgWater.src = 'water_sheet.jpg'; // 확장자 수정

    function nav(id) { kill(); document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function kill() { active = false; clearInterval(itv); cancelAnimationFrame(loop); document.querySelectorAll('.game-ov').forEach(ov => ov.style.display = 'flex'); }
    function checkLife(idx) { if(life <= 0) { kill(); document.getElementById(`ov${idx}`).innerHTML = `<p>GAME OVER</p><button class="btn btn-primary" style="width:60px" onclick="initG${idx}()">다시 시작</button>`; return true; } return false; }

    // 갤러리 로직 (확실하게 수정)
    let curSl = 0;
    function nextSl() {
        const wrap = document.getElementById('gal-wrap');
        curSl = (curSl + 1) % 3;
        wrap.style.transform = `translateX(-${curSl * 100}%)`;
    }

    // 서버 텍스트 Fetch
    async function fetchText(file) {
        const m = document.getElementById('modal');
        const c = document.getElementById('modal-content');
        m.style.display = 'flex';
        c.innerText = "불러오는 중...";
        try {
            const r = await fetch(file + "?t=" + Date.now());
            if(!r.ok) throw new Error();
            const txt = await r.text();
            c.innerText = txt;
        } catch { c.innerText = "파일을 찾을 수 없습니다."; }
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // G1: 하트 (조작패드 포함 전체 로직)
    const c1 = document.getElementById('c1'), ctx1 = c1.getContext('2d');
    let tx1 = 0, hts1 = [];
    function initG1() { c1.width = c1.offsetWidth; c1.height = c1.offsetHeight; active = true; score = 0; life = 3; hts1 = []; tx1 = c1.width/2; document.getElementById('ov1').style.display='none'; itv = setInterval(() => { if(active) hts1.push({x:Math.random()*c1.width, y:-10, s:1.5}) }, 1000); loop1(); }
    function loop1() { if(!active) return; ctx1.clearRect(0,0,c1.width,c1.height); const gY = c1.height-15; if(imgBunny.complete) ctx1.drawImage(imgBunny, tx1-15, gY-30, 30, 30); hts1.forEach((h,i)=>{ h.y+=h.s; if(imgHeart.complete) ctx1.drawImage(imgHeart,h.x-8,h.y-8,16,16); if(Math.hypot(h.x-tx1, h.y-gY+15)<20){score+=10; hts1.splice(i,1);} else if(h.y>c1.height){life--; hts1.splice(i,1); checkLife(1);} }); document.getElementById('s1').innerText=score; document.getElementById('l1').innerText="❤️".repeat(life); loop=requestAnimationFrame(loop1); }
    document.getElementById('pad1').addEventListener('touchmove', (e)=>{ let r=e.target.getBoundingClientRect(); tx1=((e.touches[0].clientX-r.left)/r.width)*c1.width; e.preventDefault(); }, {passive:false});

    // G2: 점프 (전체 로직)
    const c2 = document.getElementById('c2'), ctx2 = c2.getContext('2d');
    let ty2 = 0, dy2 = 0, obs2 = [];
    function initG2() { c2.width = c2.offsetWidth; c2.height = c2.offsetHeight; active = true; score = 0; life = 3; obs2 = []; ty2 = c2.height-15; document.getElementById('ov2').style.display='none'; itv = setInterval(() => { if(active) obs2.push({x:c2.width, w:15, h:15+Math.random()*10}) }, 1800); loop2(); }
    function jump2() { if(active && ty2 >= c2.height-17) dy2 = -4.5; }
    function loop2() { if(!active) return; ctx2.clearRect(0,0,c2.width,c2.height); const gY = c2.height-15; dy2 += 0.25; ty2 += dy2; if(ty2>gY){ty2=gY; dy2=0;} if(imgBunny.complete) ctx2.drawImage(imgBunny, 20, ty2-30, 30, 30); obs2.forEach((o,i)=>{ o.x-=2; if(imgCarrot.complete) ctx2.drawImage(imgCarrot, o.x, gY-o.h, 15, o.h); if(o.x<45 && o.x>15 && ty2>gY-o.h){life--; obs2.splice(i,1); checkLife(2);} if(o.x<-20){score+=50; obs2.splice(i,1);} }); document.getElementById('s2').innerText=score; document.getElementById('l2').innerText="❤️".repeat(life); loop=requestAnimationFrame(loop2); }

    // G3: 찾기
    const c3 = document.getElementById('c3'), ctx3 = c3.getContext('2d');
    let cts3 = [];
    function initG3() { c3.width = c3.offsetWidth; c3.height = c3.offsetHeight; active = true; score = 0; cts3 = []; for(let i=0; i<3; i++) cts3.push({x:15+Math.random()*70, y:15+Math.random()*70, f:false}); document.getElementById('ov3').style.display='none'; rdr3(); }
    function rdr3() { if(!active) return; ctx3.clearRect(0,0,c3.width,c3.height); const m = c3.width/2; ctx3.fillStyle="#eee"; ctx3.fillRect(m,0,1,c3.height); cts3.forEach(d => { let sx = d.x*m/100, sy = d.y*c3.height/100; if(imgCarrot.complete) ctx3.drawImage(imgCarrot, sx-8, sy-10, 16, 20); if(d.f) ctx3.drawImage(imgCarrot, m+sx-8, sy-10, 16, 20); }); document.getElementById('s3').innerText = `${score}/3`; if(score>=3) { kill(); document.getElementById('ov3').innerHTML = "CLEAR!<br><button class='btn btn-primary' onclick='initG3()'>다시하기</button>"; } }
    c3.onmousedown = (e) => { let r=c3.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top, m=c3.width/2; cts3.forEach(d => { if(!d.f && Math.hypot(mx-(m+d.x*m/100), my-(d.y*c3.height/100))<15) { d.f=true; score++; rdr3(); } }); };

    // G4: 방울
    const c4 = document.getElementById('c4'), ctx4 = c4.getContext('2d');
    let bbs4 = [];
    function initG4() { c4.width = c4.offsetWidth; c4.height = c4.offsetHeight; active = true; score = 0; life = 3; bbs4 = []; document.getElementById('ov4').style.display='none'; itv = setInterval(() => { if(active) bbs4.push({x:20+Math.random()*(c4.width-40), y:c4.height+20, r:18, p:0}) }, 1000); loop4(); }
    function loop4() { if(!active) return; ctx4.clearRect(0,0,c4.width,c4.height); bbs4.forEach((b, i) => { if(b.p === 0) { b.y -= 1.2; ctx4.beginPath(); ctx4.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx4.strokeStyle = "lightblue"; ctx4.stroke(); if(b.y < -20) { life--; bbs4.splice(i,1); checkLife(4); } } else { b.p--; if(b.p<=0) bbs4.splice(i,1); } }); document.getElementById('s4').innerText = score; document.getElementById('l4').innerText = "❤️".repeat(life); loop = requestAnimationFrame(loop4); }
    c4.onmousedown = (e) => { let r=c4.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top; bbs4.forEach(b => { if(b.p===0 && Math.hypot(mx-b.x, my-b.y)<b.r) { b.p=5; score+=10; } }); };
</script>
</body>
</html>
