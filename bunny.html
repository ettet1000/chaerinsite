<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 임채린 & 토루</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #ff9a9e;
            --secondary: #fad0c4;
            --text: #5d4037;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body, html {
            margin: 0; padding: 0;
            background: #fdf5e6;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow-x: hidden;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        /* 1. 하트 파티클 캔버스 배경 (15년 차의 성능 최적화) */
        #heart-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none; /* 클릭 이벤트 통과 */
            opacity: 0.6;
        }

        /* 2. 메인 컨텐츠 레이어 */
        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hero-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .bunny-visual {
            position: relative;
            transform-style: preserve-3d;
            margin-bottom: 20px;
        }

        .toru-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.15));
            transform: translateZ(50px); /* 튀어나오는 입체감 */
        }

        .ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(20px);
            width: 220px; height: 220px;
            border: 2px dashed rgba(255,154,158,0.5);
            border-radius: 50%;
            animation: rotateRing 10s linear infinite;
        }

        @keyframes rotateRing {
            0% { transform: translate(-50%, -50%) translateZ(20px) rotate(0deg); }
            100% { transform: translate(-50%, -50%) translateZ(20px) rotate(360deg); }
        }

        .owner-tag {
            display: inline-block;
            padding: 6px 18px;
            background: #8d6e63;
            color: white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 15px;
            transform: translateZ(30px);
        }

        h1 {
            font-size: 2.6rem;
            margin: 10px 0;
            color: #8d6e63;
            font-weight: 900;
            transform: translateZ(40px);
        }

        .main-desc {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #6d4c41;
            margin-bottom: 30px;
            transform: translateZ(10px);
        }

        /* 3. 입장 후 아카이브 섹션 (Hidden) */
        #archive-view {
            display: none;
            opacity: 0;
            padding: 60px 20px;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            z-index: 20;
        }

        .archive-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .archive-header h2 { font-size: 3rem; color: #8d6e63; margin: 0; }

        /* 4. 갤러리 섹션 (모바일 터치 스와이프 최적화) */
        .gallery-container {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
            border-radius: 25px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
        }

        .gallery-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .gallery-item {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: #999;
            background: #fafafa;
        }

        /* 실제 이미지가 있다면 여기에 background-image를 넣으세요 */
        .gallery-item:nth-child(1) { background: #fff1f1; color: var(--primary); }
        .gallery-item:nth-child(2) { background: #fdf5e6; color: #8d6e63; }
        .gallery-item:nth-child(3) { background: #fff0f3; color: var(--text); }

        .gallery-nav {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .nav-dot {
            width: 10px; height: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            cursor: pointer;
        }

        .nav-dot.active { background: var(--primary); }

        .btn-enter, .btn-back {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            box-shadow: 0 15px 30px rgba(255,154,158,0.4);
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-enter:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255,154,158,0.5);
        }

        .btn-back { background: #8d6e63; margin-top: 40px; font-size: 1rem; padding: 15px; }

    </style>
</head>
<body>

    <canvas id="heart-canvas"></canvas>

    <main id="main-view">
        <div class="hero-card" id="card">
            <div class="bunny-visual">
                <div class="ring"></div>
                <img src="bunny.png" class="toru-img" alt="토루">
            </div>
            <div class="owner-tag">IM CHAERIN X TORU</div>
            <h1>토끼2 랜드</h1>
            <p class="main-desc">
                제 애착인형 <strong>토루</strong>와 <strong>임채린</strong>의<br>
                공식 페이지에 오신 것을 환영합니다.
            </p>
            <button class="btn-enter" onclick="enterArchive()">입장하기</button>
        </div>
    </main>

    <section id="archive-view">
        <div class="archive-header">
            <div class="owner-tag">임채린</div>
            <h2>상세보기</h2>
        </div>

        <div class="gallery-container">
            <div class="gallery-wrapper" id="gallery-wrapper">
                <div class="gallery-item">[ 토루 사진 1 ]</div>
                <div class="gallery-item">[ 토루 사진 2 ]</div>
                <div class="gallery-item">[ 토루 사진 3 ]</div>
            </div>
            <div class="gallery-nav" id="gallery-nav">
                <div class="nav-dot active" onclick="gotoSlide(0)"></div>
                <div class="nav-dot" onclick="gotoSlide(1)"></div>
                <div class="nav-dot" onclick="gotoSlide(2)"></div>
            </div>
        </div>

        <button class="btn-back" onclick="location.reload()">처음으로</button>
    </section>

    <script>
        // 1. 하트 파티클 시스템 (Canvas API)
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 8 + 5;
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5 + 0.5;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.opacity > 0.01) this.opacity -= 0.002;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff9a9e';
                ctx.beginPath();
                // 고급 하트 그리기 수학 공식
                const topCurveHeight = this.size * 0.3;
                ctx.moveTo(this.x, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x, this.y, this.x - this.size / 2, this.y, this.x - this.size / 2, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x - this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x + this.size / 2, this.y, this.x, this.y, this.x, this.y + topCurveHeight);
                ctx.fill();
            }
        }

        function animateHearts() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.1) hearts.push(new Heart()); // 확률적으로 새 하트 생성
            for (let i = 0; i < hearts.length; i++) {
                hearts[i].update();
                hearts[i].draw();
                if (hearts[i].y < -10 || hearts[i].opacity <= 0.01) { hearts.splice(i, 1); i--; } // 화면 밖/소멸 하트 제거
            }
            requestAnimationFrame(animateHearts);
        }
        animateHearts();

        // 2. 갤러리 시스템 (GSAP 연동)
        const wrapper = document.getElementById('gallery-wrapper');
        const dots = document.querySelectorAll('.nav-dot');
        let currentSlide = 0;

        function gotoSlide(n) {
            currentSlide = n;
            gsap.to(wrapper, { x: `${-currentSlide * 100}%`, duration: 0.6, ease: "power2.inOut" });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
        }

        // 3. 페이지 전환 시스템 (Ultimate UX)
        function enterArchive() {
            const tl = gsap.timeline();
            tl.to("#main-view", { opacity: 0, scale: 1.2, duration: 0.8, ease: "power4.in" })
              .set("#main-view", { display: "none" })
              .set("#archive-view", { display: "block" })
              .to("#archive-view", { opacity: 1, duration: 0.5 })
              .from(".archive-header h2", { y: -50, opacity: 0, duration: 0.8, ease: "back.out(1.7)" })
              .from(".gallery-container", { scale: 0.8, opacity: 0, duration: 0.8 }, "-=0.5");
        }

        // 4. 모바일 기울기 패러랙스 (고급UX)
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 20;
            const y = (window.innerHeight / 2 - e.clientY) / 30;
            gsap.to(card, { rotateY: x, rotateX: -y, duration: 0.5 });
        });
        
        // 리사이즈 대응
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

    </script>
</body>
</html>
