<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 임채린 & 토루</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #ff9a9e; --text: #5d4037; --glass: rgba(255, 255, 255, 0.85); }
        body, html { margin: 0; padding: 0; background: #fdf5e6; font-family: 'Apple SD Gothic Neo', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; }
        #heart-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; opacity: 0.6; }
        
        /* Layout */
        #main-view, #archive-view { position: relative; z-index: 10; padding: 20px; max-width: 450px; margin: 0 auto; }
        #archive-view { display: none; opacity: 0; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.4); }

        /* Gallery & Video */
        .gallery-container { width: 100%; height: 250px; border-radius: 25px; overflow: hidden; position: relative; cursor: pointer; }
        .gallery-wrapper { display: flex; height: 100%; width: 300%; }
        .gallery-item { width: 33.333%; height: 100%; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        video { width: 100%; border-radius: 20px; display: block; }

        /* Text List & Modal */
        .txt-item { padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        #text-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-height: 70vh; border-radius: 25px; padding: 25px; overflow-y: auto; white-space: pre-wrap; position: relative; }

        /* Game UI */
        #game-container { position: relative; width: 100%; height: 320px; background: rgba(255,255,255,0.5); border-radius: 25px; overflow: hidden; border: 2px solid #ffcad4; }
        #game-canvas { width: 100%; height: 100%; touch-action: none; }
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-start { width: auto; padding: 12px 30px; }
    </style>
</head>
<body>
    <canvas id="heart-canvas"></canvas>

    <main id="main-view">
        <div class="card" style="text-align: center;">
            <img src="bunny.png" style="width: 140px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));" alt="토루">
            <h1>토끼2 랜드</h1>
            <p>채린 X 토루 아카이브</p>
            <button class="btn btn-primary" onclick="enterArchive()">입장하기</button>
        </div>
    </main>

    <section id="archive-view">
        <h2 style="text-align: center; color: #8d6e63;">TORU ARCHIVE</h2>

        <div class="card">
            <div class="gallery-container" onclick="nextSlide()">
                <div class="gallery-wrapper" id="gallery-wrapper">
                    <div class="gallery-item"><img src="1.jpg"></div>
                    <div class="gallery-item"><img src="2.jpg"></div>
                    <div class="gallery-item"><img src="3.jpg"></div>
                </div>
            </div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                <span id="score-ui">Score: 0</span>
                <span id="life-ui">Life: ❤️❤️❤️</span>
            </div>
            <div id="game-container">
                <canvas id="game-canvas"></canvas>
                <div id="game-overlay" class="game-overlay">
                    <h3 id="status-text">토루의 하트 캐치</h3>
                    <button class="btn btn-primary btn-start" onclick="startGame()">START</button>
                </div>
            </div>
        </div>
        
        <div class="list-card">
            <h3 style="margin-top:0;">📝 토루의 수업자료</h3>
            <ul class="txt-list">
                <li class="txt-item" onclick="readText('1.txt')"><span>수업자료1</span> <span>〉</span></li>
                <li class="txt-item" onclick="readText('2.txt')"><span>수업자료2</span> <span>〉</span></li>
                <li class="txt-item" onclick="readText('3.txt')"><span>수업자료3</span> <span>〉</span></li>
                <li class="txt-item" onclick="readText('4.txt')"><span>수업자료4</span> <span>〉</span></li>
            </ul>
        </div>

        <button class="btn" style="background: #8d6e63; color:white;" onclick="location.reload()">처음으로</button>
    </section>

    <div id="text-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="text-body">내용 로딩 중...</div>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="document.getElementById('text-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <script>
        // [1] 배경 하트 애니메이션 (Canvas)
        const bgCanvas = document.getElementById('heart-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let bgHearts = [];
        function resize() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class BgHeart {
            constructor() { this.x = Math.random()*bgCanvas.width; this.y = bgCanvas.height+10; this.s = Math.random()*8+4; this.op = 1; }
            update() { this.y -= 0.8; this.op -= 0.002; }
            draw() { bgCtx.globalAlpha = this.op; bgCtx.fillStyle = '#ff9a9e'; bgCtx.beginPath(); bgCtx.arc(this.x, this.y, this.s/2, 0, Math.PI*2); bgCtx.fill(); }
        }
        function animateBg() { bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height); if(Math.random()<0.1) bgHearts.push(new BgHeart()); bgHearts.forEach((h,i)=>{ h.update(); h.draw(); if(h.op<=0) bgHearts.splice(i,1); }); requestAnimationFrame(animateBg); }
        animateBg();

        // [2] 페이지 전환 및 갤러리
        let currentSlide = 0;
        function enterArchive() { gsap.to("#main-view", {opacity:0, duration:0.5, onComplete:()=>{ document.getElementById('main-view').style.display='none'; document.getElementById('archive-view').style.display='block'; gsap.to("#archive-view", {opacity:1}); }}); }
        function nextSlide() { currentSlide = (currentSlide+1)%3; gsap.to("#gallery-wrapper", {x: `${-currentSlide * 33.33}%`, duration:0.5}); }

        // [3] 게임 로직 (황금하트 + 폭죽 + 이지모드)
        const gCanvas = document.getElementById('game-canvas');
        const gCtx = gCanvas.getContext('2d');
        let score=0, lives=3, gameActive=false, toruX=0, items=[], toruImg=new Image();
        toruImg.src = 'bunny.png';

        function startGame() {
            gCanvas.width = gCanvas.offsetWidth; gCanvas.height = gCanvas.offsetHeight;
            score=0; lives=3; items=[]; gameActive=true;
            document.getElementById('game-overlay').style.display='none';
            updateUI(); gameLoop();
        }

        function updateUI() {
            document.getElementById('score-ui').innerText = `Score: ${score}`;
            document.getElementById('life-ui').innerText = `Life: ${"❤️".repeat(lives)}`;
        }

        const handleMove = (e) => { if(!gameActive) return; const rect = gCanvas.getBoundingClientRect(); const x = e.touches ? e.touches[0].clientX : e.clientX; toruX = x - rect.left; };
        gCanvas.addEventListener('mousemove', handleMove); gCanvas.addEventListener('touchmove', handleMove, {passive:false});

        function gameLoop() {
            if(!gameActive) return;
            gCtx.clearRect(0,0,gCanvas.width, gCanvas.height);
            gCtx.drawImage(toruImg, toruX-30, gCanvas.height-70, 60, 60);

            // 아이템 생성 (일반 하트 vs 황금 하트)
            if(Math.random() < 0.04) {
                const isGold = Math.random() < 0.1; // 10% 확률로 황금 하트
                items.push({ x: Math.random()*(gCanvas.width-30)+15, y:-20, speed: 2 + (score/500), type: isGold ? 'gold' : 'normal', size: isGold ? 25 : 20 });
            }

            items.forEach((item, i) => {
                item.y += item.speed;
                // 그리기
                gCtx.fillStyle = item.type === 'gold' ? '#FFD700' : '#ff7675';
                gCtx.beginPath(); gCtx.arc(item.x, item.y, item.size/2, 0, Math.PI*2); gCtx.fill();

                // 충돌 검사
                if(item.y > gCanvas.height-80 && item.y < gCanvas.height-20 && Math.abs(item.x - toruX) < 45) {
                    if(item.type === 'gold') { 
                        lives = Math.min(lives+1, 3); // 목숨 회복
                        confetti({ particleCount: 50, spread: 60, colors: ['#FFD700'] }); // 황금 폭죽
                    }
                    score += 20; items.splice(i,1); updateUI();
                    if(score > 0 && score % 400 === 0) confetti({ particleCount: 100, origin: {y: 0.7} }); // 400점마다 폭죽
                } else if(item.y > gCanvas.height) {
                    items.splice(i,1);
                    if(item.type === 'normal') { lives--; updateUI(); } // 황금하트는 놓쳐도 생명 안깎임
                    if(lives <= 0) { gameActive=false; document.getElementById('game-overlay').style.display='flex'; document.getElementById('status-text').innerText = `GAME OVER (${score}점)`; }
                }
            });
            requestAnimationFrame(gameLoop);
        }

        // [4] 텍스트 파일 읽기
        function readText(file) {
            const modal = document.getElementById('text-modal');
            const body = document.getElementById('text-body');
            modal.style.display='flex';
            fetch(file).then(r=>r.text()).then(t=>body.innerText=t).catch(e=>body.innerText="파일을 읽을 수 없습니다.");
        }
    </script>
</body>
</html>
