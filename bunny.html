<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 게임 선택 모드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #222; overflow: hidden;
            font-family: 'Apple SD Gothic Neo', sans-serif;
        }
        #main-container { position: relative; height: 95vh; aspect-ratio: 673 / 1024; }
        #device-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }
        
        /* 액정 영역 */
        #game-screen {
            position: absolute; top: 36.2%; left: 28.8%; width: 42.4%; height: 36.5%;
            background-color: #fdf5e6; z-index: 10; overflow-y: auto; overflow-x: hidden; border-radius: 4px;
        }
        #game-screen::-webkit-scrollbar { width: 0; }

        /* 공통 스타일 */
        :root { --primary: #ff9a9e; --text: #5d4037; --glass: rgba(255, 255, 255, 0.9); }
        .view { display: none; opacity: 0; padding: 10px; width: 100%; box-sizing: border-box; }
        .active { display: block; opacity: 1; }
        .card { background: var(--glass); border-radius: 15px; padding: 10px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 10px; margin-bottom: 5px; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #ff9a9e 0%, #ff7675 100%); color: white; }
        .btn-sub { background: #8d6e63; color: white; }

        /* 게임 캔버스 */
        .canvas-container { position: relative; width: 100%; height: 150px; background: #fff; border-radius: 15px; overflow: hidden; border: 2px solid #ffcad4; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }

        /* 아카이브 전용 */
        .gallery-container { width: 100%; height: 100px; border-radius: 10px; overflow: hidden; position: relative; }
        .gallery-wrapper { display: flex; height: 100%; width: 300%; }
        .gallery-item { width: 33.333%; height: 100%; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .txt-item { padding: 8px; background: #fff; border-radius: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; border: 1px solid #eee; font-size: 9px; cursor: pointer;}
    </style>
</head>
<body>

<div id="main-container">
    <img src="toy_device.jpg" id="device-bg">

    <div id="game-screen">
        <div id="view-intro" class="view active">
            <div class="card">
                <img src="bunny.png" style="width: 60px;">
                <h1 style="font-size: 14px; margin: 5px 0;">토끼2 랜드</h1>
                <button class="btn btn-primary" onclick="showView('view-menu')">접속하기</button>
            </div>
        </div>

        <div id="view-menu" class="view">
            <div class="card">
                <h2 style="font-size: 12px; margin-bottom: 10px;">무엇을 할까?</h2>
                <button class="btn btn-primary" onclick="showView('view-game1')">🎮 하트 매니아</button>
                <button class="btn btn-primary" onclick="showView('view-game2')">🏃 토루 점프</button>
                <button class="btn btn-sub" onclick="showView('view-archive')">📂 아카이브</button>
            </div>
        </div>

        <div id="view-game1" class="view">
            <div class="card">
                <div style="display: flex; justify-content: space-between; font-size: 8px; margin-bottom: 5px;">
                    <span id="g1-score">Score: 0</span>
                    <span id="g1-life">❤️3</span>
                </div>
                <div class="canvas-container">
                    <canvas id="canvas-g1"></canvas>
                    <div id="ov-g1" class="game-overlay" style="display: flex;">
                        <button class="btn btn-primary" style="width:auto;" onclick="startG1()">START</button>
                    </div>
                </div>
                <button class="btn btn-sub" style="margin-top:10px;" onclick="stopGames(); showView('view-menu')">나가기</button>
            </div>
        </div>

        <div id="view-game2" class="view">
            <div class="card">
                <div style="text-align: right; font-size: 8px; margin-bottom: 5px;">
                    <span id="g2-score">Score: 0</span>
                </div>
                <div class="canvas-container" onclick="jumpG2()">
                    <canvas id="canvas-g2"></canvas>
                    <div id="ov-g2" class="game-overlay" style="display: flex;">
                        <p style="font-size:8px;">클릭해서 점프!</p>
                        <button class="btn btn-primary" style="width:auto;" onclick="startG2()">START</button>
                    </div>
                </div>
                <button class="btn btn-sub" style="margin-top:10px;" onclick="stopGames(); showView('view-menu')">나가기</button>
            </div>
        </div>

        <div id="view-archive" class="view">
            <div class="card">
                <div class="gallery-container" onclick="nextSlide()">
                    <div class="gallery-wrapper" id="gallery-wrapper">
                        <div class="gallery-item"><img src="1.jpg"></div>
                        <div class="gallery-item"><img src="2.jpg"></div>
                        <div class="gallery-item"><img src="3.jpg"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3 style="margin:0 0 5px 0; font-size:10px;">📝 수업시간</h3>
                <div class="txt-item" onclick="alert('파일 로드 기능')"><span>수업시간1</span><span>〉</span></div>
                <div class="txt-item" onclick="alert('파일 로드 기능')"><span>수업시간2</span><span>〉</span></div>
            </div>
            <button class="btn btn-sub" onclick="showView('view-menu')">돌아가기</button>
        </div>
    </div>
</div>

<script>
    // --- 뷰 제어 시스템 ---
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => {
            v.style.display = 'none';
            v.style.opacity = '0';
        });
        const target = document.getElementById(id);
        target.style.display = 'block';
        gsap.to(target, {opacity: 1, duration: 0.3});
        if(id === 'view-game1') resizeCanvas('canvas-g1');
        if(id === 'view-game2') resizeCanvas('canvas-g2');
    }

    function resizeCanvas(id) {
        const c = document.getElementById(id);
        c.width = c.offsetWidth;
        c.height = c.offsetHeight;
    }

    function stopGames() {
        activeG1 = false; activeG2 = false;
        clearInterval(intG1); clearInterval(intG2);
    }

    // --- 게임 1: 하트 매니아 로직 (기존) ---
    let canvas1 = document.getElementById('canvas-g1'), ctx1 = canvas1.getContext('2d');
    let activeG1 = false, score1 = 0, life1 = 3, items1 = [], intG1, toruX1 = 50;
    const toruImg = new Image(); toruImg.src = 'bunny.png';

    function startG1() {
        resizeCanvas('canvas-g1');
        activeG1 = true; score1 = 0; life1 = 3; items1 = [];
        document.getElementById('ov-g1').style.display = 'none';
        intG1 = setInterval(() => {
            if(!activeG1) return;
            items1.push({x: Math.random()*(canvas1.width-20)+10, y: -20, s: 1.5+(score1/500)});
        }, 1000);
        loopG1();
    }

    function loopG1() {
        if(!activeG1) return;
        ctx1.clearRect(0,0,canvas1.width, canvas1.height);
        ctx1.drawImage(toruImg, toruX1-15, canvas1.height-35, 30, 30);
        items1.forEach((it, i) => {
            it.y += it.s;
            ctx1.fillStyle = '#ff7675'; ctx1.beginPath(); ctx1.arc(it.x, it.y, 5, 0, Math.PI*2); ctx1.fill();
            if(it.y > canvas1.height-35 && Math.abs(it.x - toruX1) < 20) {
                score1 += 10; items1.splice(i,1);
            } else if(it.y > canvas1.height) {
                items1.splice(i,1); life1--;
            }
        });
        document.getElementById('g1-score').innerText = `Score: ${score1}`;
        document.getElementById('g1-life').innerText = `❤️${life1}`;
        if(life1 <= 0) { activeG1 = false; document.getElementById('ov-g1').style.display = 'flex'; }
        else requestAnimationFrame(loopG1);
    }
    canvas1.addEventListener('mousemove', e => { toruX1 = e.clientX - canvas1.getBoundingClientRect().left; });
    canvas1.addEventListener('touchmove', e => { toruX1 = e.touches[0].clientX - canvas1.getBoundingClientRect().left; e.preventDefault(); }, {passive:false});

    // --- 게임 2: 토루 점프 로직 (신규) ---
    let canvas2 = document.getElementById('canvas-g2'), ctx2 = canvas2.getContext('2d');
    let activeG2 = false, score2 = 0, toruY2 = 0, dy2 = 0, obstacles2 = [], intG2;
    const jumpPower = -4.5, gravity = 0.25;

    function startG2() {
        resizeCanvas('canvas-g2');
        activeG2 = true; score2 = 0; obstacles2 = []; toruY2 = canvas2.height - 35; dy2 = 0;
        document.getElementById('ov-g2').style.display = 'none';
        intG2 = setInterval(() => {
            if(!activeG2) return;
            obstacles2.push({x: canvas2.width, w: 15, h: 20 + Math.random()*20});
        }, 1500);
        loopG2();
    }

    function jumpG2() { if(toruY2 >= canvas2.height - 36) dy2 = jumpPower; }

    function loopG2() {
        if(!activeG2) return;
        ctx2.clearRect(0,0,canvas2.width, canvas2.height);
        
        // 중력 적용
        dy2 += gravity;
        toruY2 += dy2;
        if(toruY2 > canvas2.height - 35) { toruY2 = canvas2.height - 35; dy2 = 0; }

        // 토루 그리기
        ctx2.drawImage(toruImg, 20, toruY2, 30, 30);

        // 장애물
        obstacles2.forEach((ob, i) => {
            ob.x -= 2 + (score2/1000);
            ctx2.fillStyle = '#8d6e63';
            ctx2.fillRect(ob.x, canvas2.height - ob.h, ob.w, ob.h);

            // 충돌 판정
            if(ob.x < 50 && ob.x > 10 && toruY2 + 25 > canvas2.height - ob.h) {
                activeG2 = false; document.getElementById('ov-g2').style.display = 'flex';
            }
            if(ob.x + ob.w < 0) { obstacles2.splice(i, 1); score2 += 100; }
        });

        document.getElementById('g2-score').innerText = `Score: ${score2}`;
        requestAnimationFrame(loopG2);
    }

    // 갤러리 슬라이드
    let currS = 0;
    function nextSlide() { currS = (currS+1)%3; gsap.to("#gallery-wrapper", {x: `${-currS * 33.33}%`, duration:0.5}); }
</script>
</body>
</html>
