<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 전용 기기 모드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --device-pink: #f8bbd0;
            --inner-pink: #fce4ec;
            --gold: #f0c929;
            --screen-bg: #1a1a1a;
            --text-color: #5d4037;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #fdf5e6;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
        }

        /* 1. 동그란 외형 본체 */
        .toy-body {
            width: 380px; height: 380px;
            background: var(--inner-pink);
            border: 12px solid var(--device-pink);
            border-radius: 50%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 -5px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* 2. 금색 장식 둘레 */
        .gold-bezel {
            width: 320px; height: 320px;
            background: #fff;
            border: 6px solid var(--gold);
            border-radius: 50%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 20px rgba(240, 201, 41, 0.3);
            overflow: hidden; /* 배경 하트 제한 */
        }

        /* 배경 하트 캔버스 */
        #heart-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.5; pointer-events: none;
        }

        /* 3. 중앙 네모 게임 화면 (LCD) */
        .lcd-screen {
            width: 220px; height: 170px;
            background: var(--screen-bg);
            border: 4px solid #444;
            border-radius: 8px;
            position: relative;
            z-index: 10;
            overflow: hidden;
            box-shadow: inset 0 0 10px #000;
        }

        /* 게임 내부 UI */
        .ui-panel {
            position: absolute; top: 8px; left: 0; width: 100%;
            padding: 0 10px; box-sizing: border-box;
            display: flex; justify-content: space-between;
            font-size: 11px; color: #fff; font-weight: bold;
            z-index: 20; text-shadow: 1px 1px 2px #000;
        }

        #game-canvas { width: 100%; height: 100%; touch-action: none; }

        /* 게임 오버레이 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: #fff; text-align: center;
        }

        .btn-start {
            background: linear-gradient(135deg, #ff9a9e, #ff7675);
            border: none; color: white; padding: 8px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer;
            margin-top: 10px; font-size: 14px;
        }

        /* 하단 장식용 로고 */
        .logo-text {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            font-size: 12px; font-weight: 800; color: #e91e63; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="toy-body">
    <div class="gold-bezel">
        <canvas id="heart-canvas"></canvas>
        
        <div class="lcd-screen">
            <div class="ui-panel">
                <span id="score-ui">SCORE: 0</span>
                <span id="life-ui">LIFE: ❤️❤️❤️</span>
            </div>
            
            <canvas id="game-canvas"></canvas>

            <div id="game-overlay" class="overlay">
                <div style="font-size: 14px; margin-bottom: 5px;">TORU HEART</div>
                <button class="btn-start" onclick="startGame()">START</button>
            </div>
        </div>
    </div>
    <div class="logo-text">LIM CHAERIN × TORU</div>
</div>

<script>
    // [1] 배경 하트 애니메이션 (금색 테두리 안에서만 작동)
    const bgCanvas = document.getElementById('heart-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgHearts = [];

    function resizeBg() {
        bgCanvas.width = bgCanvas.offsetWidth;
        bgCanvas.height = bgCanvas.offsetHeight;
    }
    window.addEventListener('resize', resizeBg);
    resizeBg();

    class BgHeart {
        constructor() {
            this.x = Math.random() * bgCanvas.width;
            this.y = bgCanvas.height + 10;
            this.s = Math.random() * 6 + 2;
            this.op = 1;
        }
        update() { this.y -= 0.5; this.op -= 0.003; }
        draw() {
            bgCtx.globalAlpha = Math.max(0, this.op);
            bgCtx.fillStyle = '#ff9a9e';
            bgCtx.beginPath();
            bgCtx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
            bgCtx.fill();
        }
    }

    function animateBg() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        if (Math.random() < 0.05) bgHearts.push(new BgHeart());
        for (let i = bgHearts.length - 1; i >= 0; i--) {
            bgHearts[i].update();
            bgHearts[i].draw();
            if (bgHearts[i].op <= 0) bgHearts.splice(i, 1);
        }
        requestAnimationFrame(animateBg);
    }
    animateBg();

    // [2] 게임 로직
    const gCanvas = document.getElementById('game-canvas');
    const gCtx = gCanvas.getContext('2d');
    let score = 0, lives = 3, gameActive = false, toruX = 110, items = [];
    
    // 이미지 로드 (서버에 bunny.png가 있어야 함)
    const toruImg = new Image();
    toruImg.src = 'bunny.png'; 

    function startGame() {
        gCanvas.width = gCanvas.offsetWidth;
        gCanvas.height = gCanvas.offsetHeight;
        score = 0; lives = 3; items = []; gameActive = true;
        document.getElementById('game-overlay').style.display = 'none';
        updateUI();
        gameLoop();
    }

    function updateUI() {
        document.getElementById('score-ui').innerText = `SCORE: ${score}`;
        document.getElementById('life-ui').innerText = `LIFE: ${"❤️".repeat(lives)}`;
    }

    // 마우스/터치 제어
    const handleMove = (e) => {
        if(!gameActive) return;
        const rect = gCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        toruX = clientX - rect.left;
    };
    gCanvas.addEventListener('mousemove', handleMove);
    gCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});

    function spawnItem() {
        if (!gameActive) return;
        const isGold = Math.random() < 0.15;
        items.push({
            x: Math.random() * (gCanvas.width - 20) + 10,
            y: -20,
            speed: 1.2 + (score / 1000),
            type: isGold ? 'gold' : 'normal',
            wave: Math.random() * Math.PI * 2
        });
        setTimeout(spawnItem, Math.max(600, 1200 - (score/10)));
    }

    function drawHeart(ctx, x, y, size, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.bezierCurveTo(x-size, y-size, x-size, y+size/2, x, y+size);
        ctx.bezierCurveTo(x+size, y+size/2, x+size, y-size, x, y);
        ctx.fill();
    }

    function gameLoop() {
        if (!gameActive) return;
        gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);

        // 캐릭터 그리기 (이미지 없을 시 원형으로 대체)
        if (toruImg.complete && toruImg.naturalWidth !== 0) {
            gCtx.drawImage(toruImg, toruX - 25, gCanvas.height - 55, 50, 50);
        } else {
            gCtx.fillStyle = "#fff";
            gCtx.beginPath(); gCtx.arc(toruX, gCanvas.height-30, 20, 0, Math.PI*2); gCtx.fill();
        }

        // 아이템 처리 (역순 루프로 메모리 관리 최적화)
        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            it.y += it.speed;
            it.wave += 0.05;
            const drawX = it.x + Math.sin(it.wave) * 10;

            drawHeart(gCtx, drawX, it.y, 10, it.type === 'gold' ? '#FFD700' : '#ff7675');

            // 충돌 판정
            if (it.y > gCanvas.height - 60 && it.y < gCanvas.height - 20 && Math.abs(drawX - toruX) < 35) {
                if (it.type === 'gold') {
                    lives = Math.min(lives + 1, 3);
                    confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
                }
                score += 20;
                items.splice(i, 1);
                updateUI();
            } 
            // 놓쳤을 때
            else if (it.y > gCanvas.height) {
                if (it.type === 'normal') lives--;
                items.splice(i, 1);
                updateUI();
                if (lives <= 0) {
                    gameActive = false;
                    document.getElementById('game-overlay').style.display = 'flex';
                    document.getElementById('game-overlay').innerHTML = `<div>GAME OVER<br>${score}점</div><button class="btn-start" onclick="startGame()">RETRY</button>`;
                }
            }
        }
        requestAnimationFrame(gameLoop);
    }

    // 아이템 스폰 시작
    setTimeout(spawnItem, 1000);
</script>
</body>
</html>
