<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 최종 통합본</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #ff9a9e; --text: #5d4037; --glass: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #222; overflow: hidden; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        /* 기기 배경 및 컨테이너 */
        #main-container { position: relative; height: 95vh; aspect-ratio: 673 / 1024; }
        #device-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; pointer-events: none; }
        
        /* 완구 액정 영역 */
        #game-screen {
            position: absolute; top: 36.2%; left: 28.8%; width: 42.4%; height: 36.5%;
            background-color: #fdf5e6; z-index: 10; overflow-y: auto; overflow-x: hidden; border-radius: 4px;
        }
        #game-screen::-webkit-scrollbar { width: 0; }

        /* 공통 UI */
        .view { display: none; opacity: 0; padding: 10px; width: 100%; box-sizing: border-box; }
        .view.active { display: block; opacity: 1; }
        .card { background: var(--glass); border-radius: 12px; padding: 10px; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 10px; margin-bottom: 5px; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #ff9a9e 0%, #ff7675 100%); color: white; }
        .btn-sub { background: #8d6e63; color: white; }

        /* 게임 구성 */
        .canvas-holder { position: relative; width: 100%; height: 140px; background: #fff; border-radius: 10px; overflow: hidden; border: 2px solid #ffcad4; margin: 5px 0; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        .game-ov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }

        /* 아카이브 요소 */
        .gallery-box { width: 100%; height: 90px; border-radius: 8px; overflow: hidden; position: relative; }
        .gallery-wrap { display: flex; height: 100%; width: 300%; transition: transform 0.4s ease; }
        .gallery-item { width: 33.333%; height: 100%; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .list-item { padding: 8px; background: #fff; border-radius: 8px; margin-bottom: 4px; display: flex; justify-content: space-between; border: 1px solid #eee; font-size: 9px; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-container">
    <img src="toy_device.jpg" id="device-bg">
    <div id="game-screen">
        
        <div id="view-intro" class="view active">
            <div class="card" style="margin-top: 20px;">
                <img src="bunny.png" style="width: 50px;">
                <h1 style="font-size: 12px; margin: 5px 0;">토끼2 랜드</h1>
                <button class="btn btn-primary" onclick="nav('view-menu')">접속하기</button>
            </div>
        </div>

        <div id="view-menu" class="view">
            <div class="card">
                <p style="font-size: 10px; margin: 5px 0;">메뉴를 선택해!</p>
                <button class="btn btn-primary" onclick="nav('view-g1')">🎮 하트 매니아</button>
                <button class="btn btn-primary" onclick="nav('view-g2')">🏃 토루 점프</button>
                <button class="btn btn-sub" onclick="nav('view-arc')">📂 아카이브</button>
            </div>
        </div>

        <div id="view-g1" class="view">
            <div style="display:flex; justify-content:space-between; font-size:8px; padding:0 5px;">
                <span id="s1">Score: 0</span><span id="l1">❤️3</span>
            </div>
            <div class="canvas-holder">
                <canvas id="c1"></canvas>
                <div id="ov1" class="game-ov" style="display: flex;">
                    <button class="btn btn-primary" style="width:auto;" onclick="initG1()">START</button>
                </div>
            </div>
            <button class="btn btn-sub" onclick="killGames(); nav('view-menu')">나가기</button>
        </div>

        <div id="view-g2" class="view">
            <div style="text-align:right; font-size:8px; padding:0 5px;">
                <span id="s2">Score: 0</span>
            </div>
            <div class="canvas-holder" onclick="doJump()">
                <canvas id="c2"></canvas>
                <div id="ov2" class="game-ov" style="display: flex;">
                    <p style="font-size:8px; margin:5px;">장애물을 피해!</p>
                    <button class="btn btn-primary" style="width:auto;" onclick="initG2()">START</button>
                </div>
            </div>
            <button class="btn btn-sub" onclick="killGames(); nav('view-menu')">나가기</button>
        </div>

        <div id="view-arc" class="view">
            <div class="card">
                <div class="gallery-box" onclick="nextSlide()">
                    <div class="gallery-wrap" id="g-wrap">
                        <div class="gallery-item"><img src="1.jpg"></div>
                        <div class="gallery-item"><img src="2.jpg"></div>
                        <div class="gallery-item"><img src="3.jpg"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="list-item" onclick="alert('로딩중')"><span>수업시간 1</span><span>〉</span></div>
                <div class="list-item" onclick="alert('로딩중')"><span>수업시간 2</span><span>〉</span></div>
            </div>
            <button class="btn btn-sub" onclick="nav('view-menu')">돌아가기</button>
        </div>

    </div>
</div>

<script>
    // --- 시스템 핵심 제어 ---
    const toruImg = new Image(); toruImg.src = 'bunny.png';
    let currentLoop = null;

    function nav(id) {
        killGames();
        document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.opacity = 0; });
        const target = document.getElementById(id);
        target.classList.add('active');
        gsap.to(target, {opacity: 1, duration: 0.3});
    }

    function killGames() {
        active1 = false; active2 = false;
        if(currentLoop) cancelAnimationFrame(currentLoop);
        clearInterval(itv1); clearInterval(itv2);
        document.querySelectorAll('.game-ov').forEach(ov => ov.style.display = 'flex');
    }

    // --- 게임 1: 하트 매니아 ---
    const cv1 = document.getElementById('c1'), ctx1 = cv1.getContext('2d');
    let active1 = false, score1 = 0, life1 = 3, items1 = [], itv1, tx1 = 50;

    function initG1() {
        cv1.width = cv1.offsetWidth; cv1.height = cv1.offsetHeight;
        active1 = true; score1 = 0; life1 = 3; items1 = [];
        document.getElementById('ov1').style.display = 'none';
        if(itv1) clearInterval(itv1);
        itv1 = setInterval(() => {
            if(active1) items1.push({x: Math.random()*(cv1.width-20)+10, y: -10, s: 1.2+(score1/1000)});
        }, 1000);
        loop1();
    }

    function loop1() {
        if(!active1) return;
        ctx1.clearRect(0,0,cv1.width, cv1.height);
        ctx1.drawImage(toruImg, tx1-15, cv1.height-30, 30, 30);
        items1.forEach((it, i) => {
            it.y += it.s;
            ctx1.fillStyle = '#ff7675'; ctx1.beginPath(); ctx1.arc(it.x, it.y, 4, 0, Math.PI*2); ctx1.fill();
            if(it.y > cv1.height-30 && Math.abs(it.x - tx1) < 20) { score1 += 10; items1.splice(i,1); }
            else if(it.y > cv1.height) { items1.splice(i,1); life1--; }
        });
        document.getElementById('s1').innerText = `Score: ${score1}`;
        document.getElementById('l1').innerText = `❤️${life1}`;
        if(life1 <= 0) { active1 = false; document.getElementById('ov1').style.display = 'flex'; }
        else currentLoop = requestAnimationFrame(loop1);
    }
    cv1.addEventListener('mousemove', e => { tx1 = e.clientX - cv1.getBoundingClientRect().left; });
    cv1.addEventListener('touchmove', e => { tx1 = e.touches[0].clientX - cv1.getBoundingClientRect().left; e.preventDefault(); }, {passive:false});

    // --- 게임 2: 토루 점프 (이지 모드) ---
    const cv2 = document.getElementById('c2'), ctx2 = cv2.getContext('2d');
    let active2 = false, score2 = 0, ty2 = 0, dy2 = 0, obs2 = [], itv2;
    const JUMP = -4.2, GRAV = 0.18;

    function initG2() {
        cv2.width = cv2.offsetWidth; cv2.height = cv2.offsetHeight;
        active2 = true; score2 = 0; obs2 = []; ty2 = cv2.height - 30; dy2 = 0;
        document.getElementById('ov2').style.display = 'none';
        if(itv2) clearInterval(itv2);
        itv2 = setInterval(() => {
            if(active2) obs2.push({x: cv2.width, w: 12, h: 12 + Math.random()*12});
        }, 2200);
        loop2();
    }

    function doJump() { if(ty2 >= cv2.height - 31) dy2 = JUMP; }

    function loop2() {
        if(!active2) return;
        ctx2.clearRect(0,0,cv2.width, cv2.height);
        dy2 += GRAV; ty2 += dy2;
        if(ty2 > cv2.height - 30) { ty2 = cv2.height - 30; dy2 = 0; }
        ctx2.drawImage(toruImg, 20, ty2, 30, 30);
        obs2.forEach((ob, i) => {
            ob.x -= 1.5;
            ctx2.fillStyle = '#8d6e63'; ctx2.fillRect(ob.x, cv2.height - ob.h, ob.w, ob.h);
            if(ob.x < 40 && ob.x > 15 && ty2 + 25 > cv2.height - ob.h) {
                active2 = false; document.getElementById('ov2').style.display = 'flex';
            }
            if(ob.x + ob.w < 0) { obs2.splice(i, 1); score2 += 50; }
        });
        document.getElementById('s2').innerText = `Score: ${score2}`;
        if(active2) currentLoop = requestAnimationFrame(loop2);
    }

    // 아카이브 슬라이드
    let curS = 0;
    function nextSlide() { curS = (curS+1)%3; document.getElementById('g-wrap').style.transform = `translateX(-${curS*33.33}%)`; }
</script>
</body>
</html>
