<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 임채린 & 토루</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #ff9a9e;
            --text: #5d4037;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            background: #fdf5e6;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        #heart-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; opacity: 0.6; }

        /* 메인 및 아카이브 공통 레이아웃 */
        #main-view, #archive-view { position: relative; z-index: 10; padding: 20px; max-width: 500px; margin: 0 auto; }
        #archive-view { display: none; opacity: 0; }

        .hero-card, .video-card, .list-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 텍스트 목록 스타일 */
        .txt-list { list-style: none; padding: 0; margin: 0; }
        .txt-item {
            padding: 15px;
            background: white;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .txt-item:active { transform: scale(0.98); background: var(--primary); color: white; }

        /* 텍스트 뷰어 모달 */
        #text-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: #fff;
            width: 100%;
            max-height: 80vh;
            border-radius: 25px;
            padding: 30px;
            overflow-y: auto;
            position: relative;
            white-space: pre-wrap; /* 줄바꿈 유지 */
            line-height: 1.6;
            font-size: 1rem;
        }
        .close-modal {
            position: sticky; top: -10px; float: right;
            background: var(--primary); color: white;
            border: none; padding: 10px 15px; border-radius: 12px;
            font-weight: bold;
        }

        /* 기존 요소 유지 */
        .gallery-container { width: 100%; height: 250px; border-radius: 25px; overflow: hidden; margin-bottom: 20px; }
        .gallery-wrapper { display: flex; height: 100%; width: 300%; }
        .gallery-item { width: 33.333%; height: 100%; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        video { width: 100%; border-radius: 20px; }
        .btn-enter, .btn-back { width: 100%; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; }
        .btn-enter { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <canvas id="heart-canvas"></canvas>

    <main id="main-view">
        <div class="hero-card" style="text-align:center;">
            <img src="bunny.png" style="width:120px;" alt="토루">
            <h1>토끼2 랜드</h1>
            <p>채린 X 토루 홈페이지</p>
            <button class="btn-enter" onclick="enterArchive()">입장하기</button>
        </div>
    </main>

    <section id="archive-view">
        <h2 style="text-align:center;">TORU ARCHIVE</h2>

        <div class="gallery-container" onclick="nextSlide()">
            <div class="gallery-wrapper" id="gallery-wrapper">
                <div class="gallery-item"><img src="1.jpg"></div>
                <div class="gallery-item"><img src="2.jpg"></div>
                <div class="gallery-item"><img src="3.jpg"></div>
            </div>
        </div>

        <div class="list-card">
            <h3 style="margin-top:0;">📝 토루의 수업자료</h3>
            <ul class="txt-list">
                <li class="txt-item" onclick="readText('1.txt')"><span>수업자료1</span> <span>〉</span></li>
                <li class="txt-item" onclick="readText('2.txt')"><span>수업자료2</span> <span>〉</span></li>
                <li class="txt-item" onclick="readText('3.txt')"><span>수업자료3</span> <span>〉</span></li>
                <li class="txt-item" onclick="readText('4.txt')"><span>수업자료4</span> <span>〉</span></li>
            </ul>
        </div>

        <div class="list-card" style="text-align: center; background: linear-gradient(180deg, #fff 0%, #fff0f3 100%);">
            <h3 style="margin-top:0; color: #ff7675;">💖 토루의 하트 매니아</h3>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; font-size: 0.9rem;">
                <span id="game-score" style="color: var(--primary);">Score: 0</span>
                <span id="game-level" style="color: #8d6e63;">Level: 1</span>
            </div>
        
            <div id="game-container" style="position: relative; width: 100%; height: 350px; background: rgba(255,255,255,0.5); border-radius: 25px; overflow: hidden; border: 3px solid #ffcad4; box-shadow: inset 0 0 20px rgba(255,154,158,0.1);">
                <canvas id="game-canvas"></canvas>
                
                <div id="game-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.6); backdrop-filter: blur(4px);">
                    <h2 id="status-text" style="margin-bottom: 10px; color: #8d6e63;">준비되셨나요?</h2>
                    <button id="start-btn" onclick="startGame()" style="padding: 15px 40px; background: #ff7675; color: white; border: none; border-radius: 50px; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: 0 10px 20px rgba(255,118,117,0.3);">START</button>
                </div>
            </div>
            <p style="font-size: 0.75rem; color: #b2bec3; margin-top: 10px;">Level이 올라갈수록 하트가 더 빠르게 떨어집니다!</p>
        </div>

        <button class="btn-back" onclick="location.reload()">처음으로</button>
    </section>

    <div id="text-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeModal()">닫기</button>
            <div id="text-body">내용을 불러오는 중...</div>
        </div>
    </div>

    <script>
        // 하트 애니메이션 로직 (동일)
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 1 + 0.5;
                this.opacity = 1;
            }
            update() { this.y -= this.speedY; this.opacity -= 0.003; }
            draw() { ctx.globalAlpha = this.opacity; ctx.fillStyle = '#ff9a9e'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2); ctx.fill(); }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.1) hearts.push(new Heart());
            hearts.forEach((h, i) => { h.update(); h.draw(); if (h.opacity <= 0) hearts.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        animate();

        // 페이지 전환 및 갤러리 (동일)
        let currentSlide = 0;
        function nextSlide() {
            currentSlide = (currentSlide + 1) % 3;
            gsap.to("#gallery-wrapper", { x: `${-currentSlide * 33.33}%`, duration: 0.5 });
        }
        function enterArchive() {
            gsap.to("#main-view", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('archive-view').style.display = 'block';
                gsap.to("#archive-view", { opacity: 1, duration: 0.5 });
            }});
        }

        // 텍스트 읽기 기능 (핵심!)
        function readText(fileName) {
            const modal = document.getElementById('text-modal');
            const body = document.getElementById('text-body');
            modal.style.display = 'flex';
            body.innerText = "로딩 중...";

            // Fetch API를 사용하여 서버(또는 로컬 폴더)의 txt 파일을 읽어옴
            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                    return response.text();
                })
                .then(data => {
                    body.innerText = data;
                })
                .catch(err => {
                    body.innerText = "에러: " + err.message + "\n(서버 환경이나 경로를 확인하세요)";
                });
        }

        function closeModal() {
            document.getElementById('text-modal').style.display = 'none';
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        const gCanvas = document.getElementById('game-canvas');
        const gCtx = gCanvas.getContext('2d');
        const scoreUI = document.getElementById('game-score');
        const levelUI = document.getElementById('game-level');
        const overlay = document.getElementById('game-overlay');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        
        let score = 0;
        let level = 1;
        let gameActive = false;
        let toruX = 0;
        let gameHearts = [];
        let animationId;
    
        // 난이도 조절 변수 (냉정한 확률 설계)
        const config = {
            baseSpeed: 2.5,   // 시작 속도
            speedStep: 0.5,   // 레벨업 당 추가 속도
            spawnRate: 0.04,  // 하트 생성 확률
            levelThreshold: 100 // 레벨업 점수 기준
        };
    
        const toruSprite = new Image();
        toruSprite.src = 'bunny.png';
    
        function initGame() {
            gCanvas.width = document.getElementById('game-container').clientWidth;
            gCanvas.height = 350;
            toruX = gCanvas.width / 2;
        }
    
        function moveHandler(e) {
            if(!gameActive) return;
            const rect = gCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            toruX = clientX - rect.left;
            // 화면 밖 이탈 방지
            if(toruX < 30) toruX = 30;
            if(toruX > gCanvas.width - 30) toruX = gCanvas.width - 30;
        }
    
        gCanvas.addEventListener('mousemove', moveHandler);
        gCanvas.addEventListener('touchmove', moveHandler, {passive: false});
    
        function startGame() {
            initGame();
            score = 0;
            level = 1;
            gameHearts = [];
            gameActive = true;
            overlay.style.display = 'none';
            scoreUI.innerText = `Score: 0`;
            levelUI.innerText = `Level: 1`;
            gameLoop();
        }
    
        function gameLoop() {
            if(!gameActive) return;
    
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
    
            // 1. 레벨 디자인 (점수에 따른 난이도 상승)
            let currentLevel = Math.floor(score / config.levelThreshold) + 1;
            if(currentLevel > level) {
                level = currentLevel;
                levelUI.innerText = `Level: ${level}`;
                // 레벨업 시 효과음 대신 시각적 피드백 가능 (생략)
            }
    
            // 2. 토루(플레이어) 그리기 + 부드러운 움직임
            gCtx.save();
            gCtx.shadowBlur = 15;
            gCtx.shadowColor = 'rgba(255,154,158,0.3)';
            gCtx.drawImage(toruSprite, toruX - 35, gCanvas.height - 80, 70, 70);
            gCtx.restore();
    
            // 3. 하트 생성 로직 (난이도 반영)
            if(Math.random() < config.spawnRate + (level * 0.005)) {
                gameHearts.push({
                    x: Math.random() * (gCanvas.width - 20) + 10,
                    y: -20,
                    speed: config.baseSpeed + (level * config.speedStep),
                    size: Math.random() * 10 + 15,
                    rot: Math.random() * Math.PI
                });
            }
    
            // 4. 하트 업데이트 및 그리기
            gameHearts.forEach((h, i) => {
                h.y += h.speed;
                h.rot += 0.05;
    
                // 정성스러운 하트 그리기
                gCtx.save();
                gCtx.translate(h.x, h.y);
                gCtx.rotate(h.rot);
                gCtx.fillStyle = '#ff7675';
                gCtx.beginPath();
                // 심플 하트 패스
                gCtx.moveTo(0, 0);
                gCtx.bezierCurveTo(-h.size/2, -h.size/2, -h.size, h.size/4, 0, h.size);
                gCtx.bezierCurveTo(h.size, h.size/4, h.size/2, -h.size/2, 0, 0);
                gCtx.fill();
                gCtx.restore();
    
                // 충돌 감지 (정교하게 수정)
                if(h.y > gCanvas.height - 90 && h.y < gCanvas.height - 40 && Math.abs(h.x - toruX) < 40) {
                    gameHearts.splice(i, 1);
                    score += 20;
                    scoreUI.innerText = `Score: ${score}`;
                }
    
                // 게임 오버 조건
                if(h.y > gCanvas.height) {
                    gameOver();
                }
            });
    
            animationId = requestAnimationFrame(gameLoop);
        }
    
        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            overlay.style.display = 'flex';
            statusText.innerHTML = `<span style="color:#d63031">GAME OVER</span><br><span style="font-size:1.2rem">최종 점수: ${score}</span>`;
            startBtn.innerText = "다시 도전하기";
        }
    </script>
</body>
</html>
