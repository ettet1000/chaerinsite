<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 임채린 & 토루</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #ff9a9e;
            --text: #5d4037;
            --glass: rgba(255, 255, 255, 0.75);
        }

        body, html {
            margin: 0; padding: 0;
            background: #fdf5e6;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow-x: hidden;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        #heart-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.7;
        }

        main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 인트로 카드 */
        .hero-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .toru-img-main {
            width: 160px; height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            margin-bottom: 20px;
        }

        /* 아카이브 뷰 (상세보기) */
        #archive-view {
            display: none;
            opacity: 0;
            padding: 40px 20px;
            position: relative;
            z-index: 20;
            max-width: 500px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 갤러리 레이아웃 */
        .gallery-container {
            width: 100%;
            height: 300px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .gallery-wrapper {
            display: flex;
            height: 100%;
            width: 300%; /* 사진 3장 기준 */
        }

        .gallery-item {
            width: 100.333%;
            height: 100%;
        }

        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* 비디오 카드 */
        .video-card {
            background: white;
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        video {
            width: 100%;
            border-radius: 20px;
            display: block;
        }

        .btn-enter, .btn-back {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-enter {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
        }

        .btn-back {
            background: #8d6e63;
            color: white;
            margin-top: 20px;
        }

        .owner-tag {
            display: inline-block;
            padding: 5px 15px;
            background: #8d6e63;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <canvas id="heart-canvas"></canvas>

    <main id="main-view">
        <div class="hero-card" id="card">
            <img src="bunny.png" class="toru-img-main" alt="토루">
            <div class="owner-tag">IM CHAERIN X TORU</div>
            <h1>토끼2 랜드</h1>
            <p>사랑스러운 토루의 공식 페이지입니다.</p>
            <button class="btn-enter" onclick="enterArchive()">입장하기</button>
        </div>
    </main>

    <section id="archive-view">
        <div class="section-title">
            <div class="owner-tag">임채린</div>
            <h2>TORU ARCHIVE</h2>
        </div>

        <div class="gallery-container" onclick="nextSlide()">
            <div class="gallery-wrapper" id="gallery-wrapper">
                <div class="gallery-item"><img src="1.png" alt="사진1"></div>
                <div class="gallery-item"><img src="2.jpg" alt="사진2"></div>
                <div class="gallery-item"><img src="3.jpg" alt="사진3"></div>
            </div>
        </div>
        <p style="text-align:center; font-size:0.8rem; color:#999;">위 사진을 클릭하면 다음 사진이 나옵니다</p>

        <div class="video-card">
            <h3 style="margin-top:0; color:#8d6e63;">📹 실물 영접</h3>
            <video src="toru_video.mp4" autoplay muted loop playsinline></video>
        </div>

        <button class="btn-back" onclick="location.reload()">처음으로</button>
    </section>

    <script>
        // 1. 하트 애니메이션
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.size = Math.random() * 10 + 5;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.opacity = 1;
            }
            update() {
                this.y -= this.speedY;
                this.opacity -= 0.003;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff9a9e';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.1) hearts.push(new Heart());
            hearts.forEach((h, i) => {
                h.update();
                h.draw();
                if (h.opacity <= 0) hearts.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. 갤러리 슬라이드 제어
        let currentSlide = 0;
        const wrapper = document.getElementById('gallery-wrapper');
        function nextSlide() {
            currentSlide = (currentSlide + 1) % 3;
            gsap.to(wrapper, { x: `${-currentSlide * 33.33}%`, duration: 0.5, ease: "power2.out" });
        }

        // 3. 페이지 전환
        function enterArchive() {
            const tl = gsap.timeline();
            tl.to("#main-view", { opacity: 0, y: -20, duration: 0.5 })
              .set("#main-view", { display: "none" })
              .set("#archive-view", { display: "block" })
              .to("#archive-view", { opacity: 1, y: 0, duration: 0.5 });
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
