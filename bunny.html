<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토루 월드 4-IN-1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --p: #ff9a9e; --pd: #ff7675; --txt: #5d4037; --lcd: #fdf5e6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #main-container { position: relative; height: 95vh; aspect-ratio: 673 / 1024; }
        #device-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }
        #game-screen { position: absolute; top: 36.2%; left: 28.8%; width: 42.4%; height: 36.5%; background-color: var(--lcd); z-index: 10; overflow-y: auto; overflow-x: hidden; border-radius: 4px; }
        .view { display: none; opacity: 0; padding: 8px; width: 100%; box-sizing: border-box; }
        .view.active { display: block; opacity: 1; }
        .card { background: rgba(255,255,255,0.9); border-radius: 10px; padding: 10px; margin-bottom: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .btn { width: 100%; padding: 8px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 10px; margin-bottom: 4px; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--p), var(--pd)); color: white; }
        .btn-sub { background: #8d6e63; color: white; }
        .canvas-holder { position: relative; width: 100%; height: 130px; background: #fff; border-radius: 8px; overflow: hidden; border: 2px solid #ffcad4; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        .game-ov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
        h2 { font-size: 11px; margin: 5px 0; color: var(--txt); }
    </style>
</head>
<body>

<div id="main-container">
    <img src="toy_device.jpg" id="device-bg" onerror="this.style.backgroundColor='#ffcad4'">
    <div id="game-screen">
        
        <div id="view-menu" class="view active">
            <div class="card">
                <h2>🎮 GAME SELECT</h2>
                <button class="btn btn-primary" onclick="nav('view-g1')">1. 하트 매니아</button>
                <button class="btn btn-primary" onclick="nav('view-g2')">2. 당근 점프 (쉬움)</button>
                <button class="btn btn-primary" onclick="nav('view-g3')">3. 별 먹기 (운전)</button>
                <button class="btn btn-primary" onclick="nav('view-g4')">4. 팡팡 터뜨리기</button>
                <button class="btn btn-sub" style="margin-top:5px" onclick="alert('아카이브 준비중')">📂 아카이브</button>
            </div>
        </div>

        <div id="view-g1" class="view"><div class="card"><h2>하트 매니아</h2><div class="canvas-holder"><canvas id="c1"></canvas><div id="ov1" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG1()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">나가기</button></div></div>
        <div id="view-g2" class="view"><div class="card"><h2>당근 점프</h2><div class="canvas-holder" onclick="jump2()"><canvas id="c2"></canvas><div id="ov2" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG2()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">나가기</button></div></div>
        <div id="view-g3" class="view"><div class="card"><h2>별 먹기</h2><div class="canvas-holder"><canvas id="c3"></canvas><div id="ov3" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG3()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">나가기</button></div></div>
        <div id="view-g4" class="view"><div class="card"><h2>팡팡 터뜨리기</h2><div class="canvas-holder"><canvas id="c4"></canvas><div id="ov4" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG4()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">나가기</button></div></div>

    </div>
</div>

<script>
    let loop = null, active = false, score = 0, itv = null;
    const drawToru = (ctx, x, y) => {
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(x, y, 12, 10, 0, 0, Math.PI*2); ctx.fill(); // 몸통
        ctx.beginPath(); ctx.ellipse(x-5, y-12, 4, 8, -0.2, 0, Math.PI*2); ctx.fill(); // 귀1
        ctx.beginPath(); ctx.ellipse(x+5, y-12, 4, 8, 0.2, 0, Math.PI*2); ctx.fill(); // 귀2
        ctx.fillStyle = "#000"; ctx.fillRect(x-4, y-2, 2, 2); ctx.fillRect(x+2, y-2, 2, 2); // 눈
    };

    function nav(id) {
        kill(); document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const t = document.getElementById(id); t.classList.add('active');
        gsap.to(t, {opacity: 1, duration: 0.3});
    }

    function kill() {
        active = false; if(loop) cancelAnimationFrame(loop); if(itv) clearInterval(itv);
        document.querySelectorAll('.game-ov').forEach(ov => ov.style.display = 'flex');
    }

    // --- 게임 1: 하트 매니아 ---
    let c1 = document.getElementById('c1'), ctx1 = c1.getContext('2d'), tx1 = 50, hearts1 = [];
    function initG1() {
        c1.width = c1.offsetWidth; c1.height = c1.offsetHeight; active = true; score = 0; hearts1 = [];
        document.getElementById('ov1').style.display = 'none';
        itv = setInterval(() => hearts1.push({x: Math.random()*c1.width, y: -10}), 800);
        loop1();
    }
    function loop1() {
        if(!active) return; ctx1.clearRect(0,0,c1.width, c1.height);
        drawToru(ctx1, tx1, c1.height-15);
        hearts1.forEach((h, i) => {
            h.y += 2; ctx1.fillStyle = "red"; ctx1.beginPath(); ctx1.arc(h.x, h.y, 5, 0, Math.PI*2); ctx1.fill();
            if(Math.hypot(h.x-tx1, h.y-(c1.height-15)) < 20) { score += 10; hearts1.splice(i,1); }
            if(h.y > c1.height) hearts1.splice(i,1);
        });
        loop = requestAnimationFrame(loop1);
    }
    c1.onmousemove = e => tx1 = e.offsetX;
    c1.ontouchmove = e => tx1 = e.touches[0].clientX - c1.getBoundingClientRect().left;

    // --- 게임 2: 당근 점프 ---
    let c2 = document.getElementById('c2'), ctx2 = c2.getContext('2d'), ty2 = 100, dy2 = 0, obs2 = [];
    function initG2() {
        c2.width = c2.offsetWidth; c2.height = c2.offsetHeight; active = true; score = 0; obs2 = []; ty2 = c2.height-15;
        document.getElementById('ov2').style.display = 'none';
        itv = setInterval(() => obs2.push({x: c2.width, h: 20}), 2000);
        loop2();
    }
    function jump2() { if(ty2 >= c2.height-16) dy2 = -4.5; }
    function loop2() {
        if(!active) return; ctx2.clearRect(0,0,c2.width, c2.height);
        dy2 += 0.2; ty2 += dy2; if(ty2 > c2.height-15) ty2 = c2.height-15;
        drawToru(ctx2, 30, ty2);
        obs2.forEach((o, i) => {
            o.x -= 2; ctx2.fillStyle = "orange"; ctx2.fillRect(o.x, c2.height-o.h, 10, o.h);
            if(o.x < 45 && o.x > 15 && ty2 + 10 > c2.height - o.h) kill();
            if(o.x < -10) { obs2.splice(i,1); score += 100; }
        });
        loop = requestAnimationFrame(loop2);
    }

    // --- 게임 3: 별 먹기 (좌우 이동) ---
    let c3 = document.getElementById('c3'), ctx3 = c3.getContext('2d'), tx3 = 50, stars3 = [];
    function initG3() {
        c3.width = c3.offsetWidth; c3.height = c3.offsetHeight; active = true; score = 0; stars3 = [];
        document.getElementById('ov3').style.display = 'none';
        itv = setInterval(() => stars3.push({x: Math.random()*c3.width, y: -10}), 600);
        loop3();
    }
    function loop3() {
        if(!active) return; ctx3.clearRect(0,0,c3.width, c3.height);
        drawToru(ctx3, tx3, c3.height-15);
        stars3.forEach((s, i) => {
            s.y += 3; ctx3.fillStyle = "gold"; ctx3.beginPath(); ctx3.arc(s.x, s.y, 4, 0, Math.PI*2); ctx3.fill();
            if(Math.hypot(s.x-tx3, s.y-(c3.height-15)) < 15) { score += 50; stars3.splice(i,1); }
            if(s.y > c3.height) stars3.splice(i,1);
        });
        loop = requestAnimationFrame(loop3);
    }
    c3.onmousemove = e => tx3 = e.offsetX;

    // --- 게임 4: 팡팡 터뜨리기 ---
    let c4 = document.getElementById('c4'), ctx4 = c4.getContext('2d'), bubbles4 = [];
    function initG4() {
        c4.width = c4.offsetWidth; c4.height = c4.offsetHeight; active = true; score = 0; bubbles4 = [];
        document.getElementById('ov4').style.display = 'none';
        itv = setInterval(() => bubbles4.push({x: Math.random()*c4.width, y: c4.height+10, r: 10+Math.random()*10}), 500);
        loop4();
    }
    function loop4() {
        if(!active) return; ctx4.clearRect(0,0,c4.width, c4.height);
        bubbles4.forEach((b, i) => {
            b.y -= 1; ctx4.strokeStyle = var(--pd); ctx4.beginPath(); ctx4.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx4.stroke();
            if(b.y < -20) bubbles4.splice(i,1);
        });
        loop = requestAnimationFrame(loop4);
    }
    c4.onmousedown = e => {
        bubbles4.forEach((b, i) => {
            if(Math.hypot(e.offsetX-b.x, e.offsetY-b.y) < b.r) { bubbles4.splice(i,1); score += 10; }
        });
    }
</script>
</body>
</html>
