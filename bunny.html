<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>토끼2 랜드 | 좌표 고정 모드 (수정)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #222; overflow: hidden;
        }

        /* 전체를 감싸는 컨테이너 */
        #main-container {
            position: relative;
            width: 500px;
            height: 650px; /* 이미지 비율에 맞춰 조정 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 완구 배경 이미지 */
        #device-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* [중요] 액정 위치를 강제로 잡아주는 레이어 */
        /* 이미지 중앙에서 미세하게 위쪽(34.5%)에 액정이 위치하도록 설정 */
        #game-screen {
            position: absolute;
            top: 34.5%; 
            left: 31%;
            width: 38%;
            height: 31%;
            background-color: #000;
            z-index: 10;
            overflow: hidden;
        }

        canvas { 
            display: block; /* 불필요한 공백 제거 */
            width: 100%; 
            height: 100%; 
            touch-action: none; 
        }

        .ui {
            position: absolute; top: 5px; left: 0; width: 100%;
            display: flex; justify-content: space-around;
            color: white; font-size: 10px; font-family: monospace;
            z-index: 20; pointer-events: none;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 30; color: white; text-align: center;
        }

        button {
            margin-top: 10px; padding: 5px 10px; background: #ff7675;
            border: none; color: white; cursor: pointer; border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="main-container">
    <img src="toy_device.jpg" id="device-bg">

    <div id="game-screen">
        <div class="ui">
            <span id="sc">SC: 0</span>
            <span id="lp">❤️3</span>
        </div>
        <canvas id="c"></canvas>
        <div id="ov" class="overlay">
            <div style="font-size: 10px;">TORU GAME</div>
            <button onclick="start()">START</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let score = 0, life = 3, active = false, tx = 0, items = [];

    // [중요] 루프 중복 실행 방지를 위한 변수 추가
    let animId = null;
    let spawnId = null;

    // 캔버스 크기를 액정 디브에 맞춤 (외부에서 호출)
    function resize() {
        // [중요] 캔버스의 내부 해상도를 실제 표시되는 크기와 동기화
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        tx = canvas.width / 2;
    }

    // 페이지 로드 시 캔버스 크기 조정
    window.addEventListener('load', resize);
    // 브라우저 창 크기 변경 시 대응
    window.addEventListener('resize', resize);

    function start() {
        if (active) return; // 실행 중복 방지

        // [중요] 기존 루프 찌꺼기 강제 소멸
        if (animId) cancelAnimationFrame(animId);
        if (spawnId) clearTimeout(spawnId);

        // 게임 초기화
        score = 0; life = 3; items = []; active = true;
        // UI 초기화
        document.getElementById('sc').innerText = `SC: ${score}`;
        document.getElementById('lp').innerText = `❤️${life}`;
        // 오버레이 숨기기
        document.getElementById('ov').style.display = 'none';

        loop();
        spawn();
    }

    function spawn() {
        if(!active) return;
        items.push({ x: Math.random()*canvas.width, y: -10, s: 1 + (score/200) });
        // 타이머 아이디 저장
        spawnId = setTimeout(spawn, Math.max(500, 1000 - score));
    }

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        tx = e.clientX - rect.left;
    });

    canvas.addEventListener('touchmove', (e) => {
        const rect = canvas.getBoundingClientRect();
        tx = e.touches[0].clientX - rect.left;
        e.preventDefault();
    }, {passive: false});

    function loop() {
        if(!active) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 토끼 대용 (흰색 원)
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(tx, canvas.height-15, 8, 0, Math.PI*2); ctx.fill();

        for(let i=items.length-1; i>=0; i--) {
            let it = items[i];
            it.y += it.s;
            
            // 하트 대용 (분홍 원)
            ctx.fillStyle = '#ff9a9e';
            ctx.beginPath(); ctx.arc(it.x, it.y, 4, 0, Math.PI*2); ctx.fill();

            // 충돌 판정
            if(it.y > canvas.height - 25 && Math.abs(it.x - tx) < 15) {
                score += 10; items.splice(i, 1);
                document.getElementById('sc').innerText = `SC: ${score}`;
            } else if(it.y > canvas.height) {
                life--; items.splice(i, 1);
                document.getElementById('lp').innerText = `❤️${life}`;
                
                // 게임 오버 처리
                if(life <= 0) {
                    active = false;
                    document.getElementById('ov').style.display = 'flex';
                    document.getElementById('ov').innerHTML = `GAME OVER<button onclick="start()">RETRY</button>`;
                }
            }
        }
        // 애니메이션 프레임 아이디 저장
        animId = requestAnimationFrame(loop);
    }
</script>
</body>
</html>
