<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 임채린 & 토루</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #ff9a9e; --text: #5d4037; --glass: rgba(255, 255, 255, 0.85); }
        body, html { margin: 0; padding: 0; background: #fdf5e6; font-family: 'Apple SD Gothic Neo', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; overflow-x: hidden;}
        #heart-canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; opacity: 0.6; }
        
        /* Layout */
        #main-view, #archive-view { position: relative; z-index: 10; padding: 20px; max-width: 450px; margin: 0 auto; }
        #archive-view { display: none; opacity: 0; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.4); }

        /* Gallery & Video */
        .gallery-container { width: 100%; height: 250px; border-radius: 25px; overflow: hidden; position: relative; cursor: pointer; }
        .gallery-wrapper { display: flex; height: 100%; width: 300%; }
        .gallery-item { width: 33.333%; height: 100%; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        video { width: 100%; border-radius: 20px; display: block; }

        /* Text List & Modal */
        .txt-item { padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; border: 1px solid #eee;}
        #text-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-height: 70vh; border-radius: 25px; padding: 25px; overflow-y: auto; white-space: pre-wrap; position: relative; line-height: 1.6;}

        /* Game UI */
        #game-container { position: relative; width: 100%; height: 350px; background: rgba(255,255,255,0.6); border-radius: 25px; overflow: hidden; border: 3px solid #ffcad4; box-shadow: inset 0 0 15px rgba(255,154,158,0.1);}
        #game-canvas { width: 100%; height: 100%; touch-action: none; cursor: none;}
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; backdrop-filter: blur(3px);}
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem;}
        .btn-primary { background: linear-gradient(135deg, #ff9a9e 0%, #ff7675 100%); color: white; box-shadow: 0 5px 15px rgba(255,118,117,0.3);}
        .btn-start { width: auto; padding: 12px 40px; font-size: 1.2rem;}
    </style>
</head>
<body>
    <canvas id="heart-canvas"></canvas>

    <main id="main-view">
        <div class="card" style="text-align: center;">
            <img src="bunny.png" style="width: 140px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));" alt="토루">
            <h1>토끼2 랜드</h1>
            <p style="color: #8d6e63; font-weight: bold;">IM CHAERIN X TORU 2026</p>
            <button class="btn btn-primary" onclick="enterArchive()">입장하기</button>
        </div>
    </main>

    <section id="archive-view">
        <h2 style="text-align: center; color: #8d6e63; letter-spacing: -1px;">토루와 임채린의 비밀공간</h2>

        <div class="card">
            <div class="gallery-container" onclick="nextSlide()">
                <div class="gallery-wrapper" id="gallery-wrapper">
                    <div class="gallery-item"><img src="1.jpg" alt="사진1"></div>
                    <div class="gallery-item"><img src="2.jpg" alt="사진2"></div>
                    <div class="gallery-item"><img src="3.jpg" alt="사진3"></div>
                </div>
            </div>
            <p style="text-align:center; font-size:0.8rem; color:#999; margin:10px 0 0;">사진을 클릭하면 다음 장으로 넘어갑니다</p>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; font-weight: bold;">
                <span id="score-ui" style="color: var(--primary);">Score: 0</span>
                <span id="life-ui" style="color: #8d6e63;">Life: ❤️❤️❤️</span>
            </div>
            <div id="game-container">
                <canvas id="game-canvas"></canvas>
                <div id="game-overlay" class="game-overlay">
                    <h2 id="status-text" style="color: #8d6e63; margin-bottom: 15px;">토루의 하트 매니아</h2>
                    <button class="btn btn-primary btn-start" onclick="startGame()">START</button>
                </div>
            </div>
            <p style="font-size:0.75rem; color:#b2bec3; margin:10px 0 0;">토루를 좌우로 움직여 살랑거리며 떨어지는 하트를 잡으세요!</p>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color: #8d6e63;">📝 토루의 수업시간</h3>
            <div class="txt-item" onclick="readText('1.txt')"><span>수업시간1</span><span>〉</span></div>
            <div class="txt-item" onclick="readText('2.txt')"><span>수업시간2</span><span>〉</span></div>
            <div class="txt-item" onclick="readText('3.txt')"><span>수업시간3</span><span>〉</span></div>
            <div class="txt-item" onclick="readText('4.txt')"><span>수업시간4</span><span>〉</span></div>
        </div>

        <button class="btn" style="background: #8d6e63; color:white;" onclick="location.reload()">처음으로</button>
    </section>

    <div id="text-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="text-body">내용 로딩 중...</div>
            <button class="btn btn-primary" style="margin-top:25px; padding: 12px;" onclick="document.getElementById('text-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <script>
        // [1] 배경 하트 애니메이션 (Canvas 최적화)

        const bgCtx = bgCanvas.getContext('2d');
