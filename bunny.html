<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토루 월드 V8.0 | 장난감 액정 통합본</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --p: #ff9a9e; --pd: #ff7675; --txt: #5d4037; --lcd-bg: #fdf5e6; 
            --glass: rgba(255, 255, 255, 0.9);
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #1a1a1a; overflow: hidden; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        /* [핵심] 장난감 기기 배경 */
        #main-container { 
            position: relative; height: 98vh; aspect-ratio: 673 / 1024; 
            background: url('toy_device.jpg') no-repeat center center; background-size: contain; 
        }
        
        /* [핵심] 액정 화면 영역 (이 안에서만 모든 것이 일어남) */
        #game-screen { 
            position: absolute; top: 35.2%; left: 28.8%; width: 42.4%; height: 34.5%; 
            background-color: var(--lcd-bg); z-index: 10; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; scroll-behavior: smooth;
        }

        /* 액정 내부 UI 스타일링 */
        .view { display: none; width: 100%; min-height: 100%; flex-shrink: 0; padding: 8px; box-sizing: border-box; }
        .view.active { display: block; }

        .card { background: var(--glass); border-radius: 12px; padding: 10px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        h1 { font-size: 14px; margin: 5px 0; color: var(--txt); }
        h2 { font-size: 11px; margin: 4px 0; color: var(--pd); }
        p { font-size: 9px; margin: 2px 0; }

        .btn { width: 100%; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 10px; margin-bottom: 4px; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--p), var(--pd)); color: white; }
        
        /* 갤러리 (액정용) */
        .gallery-container { width: 100%; height: 80px; border-radius: 8px; overflow: hidden; position: relative; }
        .gallery-wrapper { display: flex; height: 100%; width: 300%; }
        .gallery-item { width: 33.333%; height: 100%; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* 수업자료 목록 */
        .txt-item { padding: 8px; background: #fff; border-radius: 8px; margin-bottom: 4px; display: flex; justify-content: space-between; font-size: 9px; border: 1px solid #eee; cursor: pointer; }

        /* 게임 캔버스 영역 */
        #canvas-holder { position: relative; width: 100%; height: 120px; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #ffcad4; }
        canvas { width: 100%; height: 100%; display: block; }
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; font-size: 10px; }

        /* 모달 (액정 내부 모달) */
        #text-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--lcd-bg); z-index: 1000; display: none; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .modal-content { flex-grow: 1; font-size: 9px; line-height: 1.4; overflow-y: auto; white-space: pre-wrap; background: #fff; padding: 8px; border-radius: 8px; }

        /* 스크롤바 숨기기 */
        #game-screen::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="game-screen">
        
        <div id="view-start" class="view active">
            <div class="card">
                <img src="bunny.png" style="width: 60px;">
                <h1>토끼2 랜드</h1>
                <p>LIM CHAERIN X TORU</p>
                <button class="btn btn-primary" onclick="nav('view-menu')">입장하기</button>
            </div>
        </div>

        <div id="view-menu" class="view">
            <div class="card">
                <h2>비밀 공간 메뉴</h2>
                <button class="btn btn-primary" onclick="nav('view-gallery')">🖼 갤러리 보기</button>
                <button class="btn btn-primary" onclick="nav('view-game')">🎮 하트 게임</button>
                <button class="btn btn-primary" onclick="nav('view-study')">📝 수업 자료</button>
                <button class="btn" style="background:#8d6e63; color:white;" onclick="nav('view-start')">뒤로가기</button>
            </div>
        </div>

        <div id="view-gallery" class="view">
            <div class="card">
                <h2>갤러리 (클릭 시 다음)</h2>
                <div class="gallery-container" onclick="nextSlide()">
                    <div class="gallery-wrapper" id="gallery-wrapper">
                        <div class="gallery-item"><img src="1.jpg"></div>
                        <div class="gallery-item"><img src="2.jpg"></div>
                        <div class="gallery-item"><img src="3.jpg"></div>
                    </div>
                </div>
                <button class="btn" style="margin-top:10px; font-size:8px;" onclick="nav('view-menu')">메뉴로</button>
            </div>
        </div>

        <div id="view-game" class="view">
            <div style="display:flex; justify-content:space-between; font-size:8px; margin-bottom:4px;">
                <span id="score-ui">Score: 0</span>
                <span id="life-ui">❤️❤️❤️</span>
            </div>
            <div id="canvas-holder">
                <canvas id="game-canvas"></canvas>
                <div id="game-overlay" class="game-overlay">
                    <p id="status-text">하트 매니아</p>
                    <button class="btn btn-primary" style="width:auto; padding:5px 15px;" onclick="startGame()">START</button>
                </div>
            </div>
            <button class="btn" style="margin-top:8px; font-size:8px;" onclick="killGame(); nav('view-menu')">그만하기</button>
        </div>

        <div id="view-study" class="view">
            <div class="card" style="text-align:left;">
                <h2>📝 수업 자료 목록</h2>
                <div class="txt-item" onclick="readText('1.txt')"><span>수업시간1</span><span>〉</span></div>
                <div class="txt-item" onclick="readText('2.txt')"><span>수업시간2</span><span>〉</span></div>
                <div class="txt-item" onclick="readText('3.txt')"><span>수업시간3</span><span>〉</span></div>
                <div class="txt-item" onclick="readText('4.txt')"><span>수업시간4</span><span>〉</span></div>
                <button class="btn" style="margin-top:10px; font-size:8px;" onclick="nav('view-menu')">메뉴로</button>
            </div>
        </div>

        <div id="text-modal">
            <div class="modal-content" id="text-body">내용 로딩 중...</div>
            <button class="btn btn-primary" style="margin-top:8px;" onclick="document.getElementById('text-modal').style.display='none'">닫기</button>
        </div>

    </div>
</div>

<script>
    // 네비게이션
    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const target = document.getElementById(id);
        target.classList.add('active');
        document.getElementById('game-screen').scrollTop = 0;
        gsap.fromTo(target, {opacity: 0}, {opacity: 1, duration: 0.3});
        if(id !== 'view-game') killGame();
    }

    // 갤러리 슬라이드
    let currentSlide = 0;
    function nextSlide() {
        currentSlide = (currentSlide + 1) % 3;
        gsap.to("#gallery-wrapper", {x: `${-currentSlide * 33.33}%`, duration: 0.5});
    }

    // 수업 자료 로드
    function readText(file) {
        const modal = document.getElementById('text-modal');
        const body = document.getElementById('text-body');
        modal.style.display = 'flex';
        body.innerText = "로딩 중...";
        fetch(file).then(r => r.text()).then(t => body.innerText = t).catch(() => body.innerText = "파일을 찾을 수 없습니다.");
    }

    // 게임 엔진 (액정 사이즈 최적화)
    const gCanvas = document.getElementById('game-canvas');
    const gCtx = gCanvas.getContext('2d');
    let score=0, lives=3, gameActive=false, toruX=50, items=[], toruImg=new Image(), gameInterval, loop;
    toruImg.src = 'bunny.png';

    function startGame() {
        gCanvas.width = gCanvas.offsetWidth; gCanvas.height = gCanvas.offsetHeight;
        score=0; lives=3; items=[]; gameActive=true; toruX = gCanvas.width/2;
        document.getElementById('game-overlay').style.display='none';
        updateUI();
        clearInterval(gameInterval);
        gameInterval = setInterval(spawnHeart, 1500);
        gameLoop();
    }

    function killGame() {
        gameActive = false;
        clearInterval(gameInterval);
        cancelAnimationFrame(loop);
        document.getElementById('game-overlay').style.display='flex';
    }

    function updateUI() {
        document.getElementById('score-ui').innerText = `Score: ${score}`;
        document.getElementById('life-ui').innerText = "❤️".repeat(Math.max(0, lives));
    }

    function spawnHeart() {
        if(!gameActive) return;
        items.push({ x: Math.random()*(gCanvas.width-20)+10, y:-20, speed: 1 + (score/200), size: 15 });
    }

    // 터치/마우스 제어
    const handleMove = (e) => {
        if(!gameActive) return;
        const rect = gCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        toruX = clientX - rect.left;
    };
    gCanvas.addEventListener('mousemove', handleMove);
    gCanvas.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, {passive:false});

    function drawHeart(ctx, x, y, size, color) {
        ctx.fillStyle = color; ctx.beginPath();
        ctx.moveTo(x, y + size/4);
        ctx.bezierCurveTo(x, y, x - size/2, y, x - size/2, y + size/4);
        ctx.bezierCurveTo(x - size/2, y + size/1.5, x, y + size, x, y + size);
        ctx.bezierCurveTo(x, y + size/1.5, x + size/2, y + size/4, x + size/2, y + size/4);
        ctx.bezierCurveTo(x + size/2, y, x, y, x, y + size/4);
        ctx.fill();
    }

    function gameLoop() {
        if(!gameActive) return;
        gCtx.clearRect(0,0,gCanvas.width, gCanvas.height);
        
        // 토끼 그리기 (액정 크기에 맞게 축소)
        gCtx.drawImage(toruImg, toruX-15, gCanvas.height-35, 30, 30);

        items.forEach((item, i) => {
            item.y += item.speed;
            drawHeart(gCtx, item.x, item.y, item.size, '#ff7675');

            // 충돌 판정
            if(item.y > gCanvas.height-40 && item.y < gCanvas.height-10 && Math.abs(item.x - toruX) < 20) {
                score += 10; items.splice(i,1); updateUI();
                if(score % 50 === 0) confetti({particleCount: 30, spread: 50, origin: { y: 0.6 }});
            } else if(item.y > gCanvas.height) {
                items.splice(i,1); lives--; updateUI();
                if(lives <= 0) {
                    gameActive=false; 
                    document.getElementById('game-overlay').style.display='flex';
                    document.getElementById('status-text').innerText = `종료! 점수:${score}`;
                }
            }
        });
        loop = requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
