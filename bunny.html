<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토끼2 랜드 | 기기 일체형 모드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #f0f0f0; overflow: hidden;
        }

        /* [핵심] 완구 이미지 본체 */
        .device-wrapper {
            position: relative;
            width: 500px; /* 이미지의 원본 비율에 맞게 조정 */
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .device-img {
            width: 100%;
            display: block;
            pointer-events: none; /* 이미지가 클릭을 방해하지 않게 설정 */
        }

        /* [핵심] 이미지 내 액정 위치에 맞춘 게임 레이어 */
        .screen-area {
            position: absolute;
            /* 이미지 내 검은 액정 위치 좌표 (이미지 비율에 따라 미세조정 필요) */
            top: 30.5%; 
            left: 31.2%;
            width: 37.5%;
            height: 38.5%;
            background-color: #000;
            overflow: hidden;
            border-radius: 5px;
        }

        #game-canvas { width: 100%; height: 100%; touch-action: none; }

        .ui-panel {
            position: absolute; top: 5px; left: 0; width: 100%;
            padding: 0 8px; box-sizing: border-box;
            display: flex; justify-content: space-between;
            font-size: 10px; color: #fff; font-weight: bold;
            z-index: 20; font-family: monospace;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: #fff; text-align: center; font-size: 12px;
        }

        .btn-start {
            background: #ff7675; border: none; color: white; padding: 5px 15px;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="device-wrapper">
    <img src="toy_device.jpg" class="device-img" alt="완구 본체">

    <div class="screen-area">
        <div class="ui-panel">
            <span id="score-ui">SC: 0</span>
            <span id="life-ui">❤️3</span>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="game-overlay" class="overlay">
            <div>토루의 하트 매니아</div>
            <button class="btn-start" onclick="startGame()">START</button>
        </div>
    </div>
</div>

<script>
    const gCanvas = document.getElementById('game-canvas');
    const gCtx = gCanvas.getContext('2d');
    let score = 0, lives = 3, gameActive = false, toruX = 0, items = [];
    const toruImg = new Image();
    toruImg.src = 'bunny.png';

    function startGame() {
        // 액정 영역 크기에 맞춰 캔버스 해상도 설정
        gCanvas.width = gCanvas.offsetWidth;
        gCanvas.height = gCanvas.offsetHeight;
        score = 0; lives = 3; items = []; gameActive = true;
        document.getElementById('game-overlay').style.display = 'none';
        updateUI();
        gameLoop();
        spawnItem();
    }

    function updateUI() {
        document.getElementById('score-ui').innerText = `SC: ${score}`;
        document.getElementById('life-ui').innerText = `❤️${lives}`;
    }

    const handleMove = (e) => {
        if(!gameActive) return;
        const rect = gCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        toruX = clientX - rect.left;
    };
    gCanvas.addEventListener('mousemove', handleMove);
    gCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});

    function spawnItem() {
        if (!gameActive) return;
        items.push({
            x: Math.random() * (gCanvas.width - 15) + 7,
            y: -10,
            speed: 1.2 + (score / 1500),
            type: Math.random() < 0.1 ? 'gold' : 'normal'
        });
        setTimeout(spawnItem, Math.max(700, 1500 - (score/5)));
    }

    function gameLoop() {
        if (!gameActive) return;
        gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);

        // 토루 그리기
        if (toruImg.complete) {
            gCtx.drawImage(toruImg, toruX - 15, gCanvas.height - 35, 30, 30);
        } else {
            gCtx.fillStyle = "#fff";
            gCtx.beginPath(); gCtx.arc(toruX, gCanvas.height-20, 10, 0, Math.PI*2); gCtx.fill();
        }

        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            it.y += it.speed;
            
            // 하트 그리기
            gCtx.fillStyle = it.type === 'gold' ? '#FFD700' : '#ff9a9e';
            gCtx.beginPath();
            gCtx.arc(it.x, it.y, 5, 0, Math.PI*2);
            gCtx.fill();

            // 충돌 판정
            if (it.y > gCanvas.height - 40 && it.y < gCanvas.height - 10 && Math.abs(it.x - toruX) < 20) {
                if (it.type === 'gold') lives = Math.min(lives + 1, 3);
                score += 10;
                items.splice(i, 1);
                updateUI();
            } else if (it.y > gCanvas.height) {
                if (it.type === 'normal') lives--;
                items.splice(i, 1);
                updateUI();
                if (lives <= 0) {
                    gameActive = false;
                    document.getElementById('game-overlay').style.display = 'flex';
                    document.getElementById('game-overlay').innerHTML = `<div>OVER<br>${score}</div><button class="btn-start" onclick="startGame()">RETRY</button>`;
                }
            }
        }
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
