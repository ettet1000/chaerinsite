<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TORU MOBILE PRESTIGE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #ff9a9e;
            --bg: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 배경 그라데이션 (GPU 가속 활용) */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2d2424 0%, #000 100%);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.3;
            z-index: -1;
        }

        /* 메인 인터페이스 */
        .container {
            width: 90%;
            max-width: 400px;
            perspective: 2000px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            transform-style: preserve-3d;
            will-change: transform;
        }

        .bunny-wrap {
            position: relative;
            transform-style: preserve-3d;
            margin-bottom: 20px;
        }

        .bunny-img {
            width: 180px;
            height: 180px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4));
            transform: translateZ(50px); /* 튀어나오는 효과 */
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 10px 0;
            background: linear-gradient(135deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(30px);
        }

        .info-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            transform: translateZ(20px);
        }

        .tag {
            font-size: 0.7rem;
            padding: 5px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            border: 0.5px solid var(--primary);
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 20px;
            transform: translateZ(40px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 모바일 터치 피드백 */
        .btn-main:active {
            transform: translateZ(20px) scale(0.95);
            background: var(--primary);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="blob" id="blob1" style="top: -10%; left: -10%;"></div>
    <div class="blob" id="blob2" style="bottom: -10%; right: -10%;"></div>

    <div class="container">
        <div class="glass-card" id="card">
            <div class="bunny-wrap">
                <img src="bunny.png" class="bunny-img" alt="TORU">
            </div>
            <h1>TORU WORLD</h1>
            <div class="info-group">
                <div class="tag">FEEL: PREMIUM SOFT</div>
                <div class="tag">VER: 2.0.26</div>
            </div>
            <button class="btn-action btn-main" onclick="triggerEffect()">SYSTEM START</button>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const blob1 = document.getElementById('blob1');
        const blob2 = document.getElementById('blob2');

        // 모바일 가속도계/터치 이벤트 (15년 차의 최적화 로직)
        // 데스크톱 마우스와 모바일 터치를 모두 대응하는 하이브리드 로직
        const handleMove = (e) => {
            let x, y;
            if (e.type === 'touchmove') {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const moveX = (centerX - x) / 10;
            const moveY = (centerY - y) / 15;

            gsap.to(card, {
                rotateY: moveX,
                rotateX: -moveY,
                duration: 0.5,
                ease: "power2.out"
            });

            // 배경 블롭(Blob) 연동
            gsap.to(blob1, { x: moveX * 2, y: moveY * 2, duration: 1 });
            gsap.to(blob2, { x: -moveX * 2, y: -moveY * 2, duration: 1 });
        };

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', handleMove);

        // 터치 종료 시 원복
        const resetCard = () => {
            gsap.to(card, { rotateX: 0, rotateY: 0, duration: 1, ease: "elastic.out(1, 0.5)" });
        };
        document.addEventListener('touchend', resetCard);
        document.addEventListener('mouseleave', resetCard);

        function triggerEffect() {
            // Haptic Feedback (진동) - 안드로이드 등 지원 브라우저 한정
            if (navigator.vibrate) navigator.vibrate(50);

            const tl = gsap.timeline();
            tl.to(".bunny-img", { scale: 1.2, rotation: 360, duration: 0.6, ease: "back.out(1.7)" })
              .to(".glass-card", { y: -20, duration: 0.2, yoyo: true, repeat: 1 })
              .call(() => {
                  alert("TORU MOBILE SYSTEM ONLINE");
              });
        }
    </script>
</body>
</html>
