<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>토루 랜드 | 무결점 수정본</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --p: #ff9a9e; --pd: #ff7675; --txt: #5d4037; --lcd: #fdf5e6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #main-container { position: relative; height: 95vh; aspect-ratio: 673 / 1024; }
        #device-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; pointer-events: none; }
        #game-screen { position: absolute; top: 36.2%; left: 28.8%; width: 42.4%; height: 36.5%; background-color: var(--lcd); z-index: 10; overflow: hidden; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        .view { display: none; opacity: 0; padding: 10px; width: 100%; height: 100%; box-sizing: border-box; flex-direction: column; justify-content: center; }
        .view.active { display: flex; opacity: 1; }
        .card { background: rgba(255,255,255,0.9); border-radius: 12px; padding: 8px; text-align: center; border: 1px solid #eee; }
        .btn { width: 100%; padding: 8px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 10px; margin-bottom: 5px; }
        .btn-primary { background: linear-gradient(135deg, var(--p), var(--pd)); color: white; }
        .btn-sub { background: #8d6e63; color: white; margin-top: 5px; }
        .canvas-holder { position: relative; width: 100%; height: 120px; background: #fff; border-radius: 8px; overflow: hidden; border: 2px solid #ffcad4; margin: 5px 0; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        .game-ov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .score-display { font-size: 10px; font-weight: bold; color: var(--pd); text-align: right; }
    </style>
</head>
<body>

<div id="main-container">
    <img src="toy_device.jpg" id="device-bg" onerror="this.style.backgroundColor='#ffcad4'">
    <div id="game-screen">
        <div id="view-menu" class="view active">
            <div class="card">
                <h2 style="font-size:11px; margin:5px 0">🐰 토루 월드</h2>
                <button class="btn btn-primary" onclick="nav('view-g1')">하트 수집</button>
                <button class="btn btn-primary" onclick="nav('view-g2')">당근 점프</button>
                <button class="btn btn-primary" onclick="nav('view-g3')">별 수집가</button>
                <button class="btn btn-primary" onclick="nav('view-g4')">방울 팡팡</button>
            </div>
        </div>
        <div id="view-g1" class="view"><div class="score-display" id="s1">Score: 0</div><div class="canvas-holder"><canvas id="c1"></canvas><div id="ov1" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG1()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">EXIT</button></div>
        <div id="view-g2" class="view"><div class="score-display" id="s2">Score: 0</div><div class="canvas-holder" onclick="jump2()"><canvas id="c2"></canvas><div id="ov2" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG2()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">EXIT</button></div>
        <div id="view-g3" class="view"><div class="score-display" id="s3">Score: 0</div><div class="canvas-holder"><canvas id="c3"></canvas><div id="ov3" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG3()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">EXIT</button></div>
        <div id="view-g4" class="view"><div class="score-display" id="s4">Score: 0</div><div class="canvas-holder"><canvas id="c4"></canvas><div id="ov4" class="game-ov"><button class="btn btn-primary" style="width:auto" onclick="initG4()">START</button></div></div><button class="btn btn-sub" onclick="kill(); nav('view-menu')">EXIT</button></div>
    </div>
</div>

<script>
    let loop = null, active = false, itv = null, score = 0;

    // 이미지 객체 미리 생성 (에러 방지용)
    const imgBunny = new Image(); imgBunny.src = 'bunny.png';
    const imgHeart = new Image(); imgHeart.src = 'heart_red.png';
    const imgCarrot = new Image(); imgCarrot.src = 'obs_carrot.png';

    // 통합 그리기 함수 (이미지 로드 여부를 매 프레임 체크)
    function drawToru(ctx, x, y) {
        if (imgBunny.complete && imgBunny.naturalWidth > 0) {
            ctx.drawImage(imgBunny, x - 15, y - 20, 30, 30);
        } else {
            // 이미지 없을 때 그리는 토끼 (몸통+귀 포함)
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(x, y, 12, 10, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.ellipse(x-5, y-12, 4, 8, -0.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x+5, y-12, 4, 8, 0.2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.fillRect(x-3, y-2, 2, 2); ctx.fillRect(x+1, y-2, 2, 2);
        }
    }

    function nav(id) {
        kill();
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        gsap.fromTo(`#${id}`, {opacity:0}, {opacity:1, duration:0.3});
    }

    function kill() {
        active = false;
        if(loop) cancelAnimationFrame(loop);
        if(itv) clearInterval(itv);
        document.querySelectorAll('.game-ov').forEach(ov => ov.style.display = 'flex');
    }

    // --- GAME 1: 하트 수집 ---
    const c1 = document.getElementById('c1'), ctx1 = c1.getContext('2d');
    let tx1 = 50, hearts1 = [];
    function initG1() {
        c1.width = c1.offsetWidth; c1.height = c1.offsetHeight;
        if(c1.width === 0) { setTimeout(initG1, 10); return; } // 레이아웃 렌더링 대기
        active = true; score = 0; hearts1 = []; tx1 = c1.width/2;
        document.getElementById('ov1').style.display = 'none';
        itv = setInterval(() => { if(active) hearts1.push({x: Math.random()*c1.width, y: -20}) }, 800);
        loop1();
    }
    function loop1() {
        if(!active) return;
        ctx1.clearRect(0,0,c1.width, c1.height);
        drawToru(ctx1, tx1, c1.height-15);
        for(let i=hearts1.length-1; i>=0; i--) {
            let h = hearts1[i]; h.y += 1.8;
            if(imgHeart.complete && imgHeart.naturalWidth > 0) ctx1.drawImage(imgHeart, h.x-8, h.y-8, 16, 16);
            else { ctx1.fillStyle = "#ff7675"; ctx1.beginPath(); ctx1.arc(h.x, h.y, 6, 0, Math.PI*2); ctx1.fill(); }
            if(Math.hypot(h.x-tx1, h.y-(c1.height-15)) < 18) { score += 10; hearts1.splice(i, 1); }
            else if(h.y > c1.height) hearts1.splice(i, 1);
        }
        document.getElementById('s1').innerText = `Score: ${score}`;
        loop = requestAnimationFrame(loop1);
    }
    c1.onmousemove = e => tx1 = e.offsetX;
    c1.ontouchmove = e => { tx1 = e.touches[0].clientX - c1.getBoundingClientRect().left; e.preventDefault(); };

    // --- GAME 2: 당근 점프 ---
    const c2 = document.getElementById('c2'), ctx2 = c2.getContext('2d');
    let ty2 = 0, dy2 = 0, obs2 = [];
    function initG2() {
        c2.width = c2.offsetWidth; c2.height = c2.offsetHeight;
        active = true; score = 0; obs2 = []; ty2 = c2.height-15; dy2 = 0;
        document.getElementById('ov2').style.display = 'none';
        itv = setInterval(() => { if(active) obs2.push({x: c2.width, h: 20}) }, 2000);
        loop2();
    }
    function jump2() { if(ty2 >= c2.height-16) dy2 = -4.2; }
    function loop2() {
        if(!active) return;
        ctx2.clearRect(0,0,c2.width, c2.height);
        dy2 += 0.2; ty2 += dy2; if(ty2 > c2.height-15) ty2 = c2.height-15;
        drawToru(ctx2, 30, ty2);
        for(let i=obs2.length-1; i>=0; i--) {
            let o = obs2[i]; o.x -= 2;
            if(imgCarrot.complete && imgCarrot.naturalWidth > 0) ctx2.drawImage(imgCarrot, o.x, c2.height-o.h-5, 20, 25);
            else { ctx2.fillStyle = "#ffa502"; ctx2.fillRect(o.x, c2.height-o.h, 12, o.h); }
            if(o.x < 45 && o.x > 15 && ty2+8 > c2.height-o.h) kill();
            if(o.x < -20) { obs2.splice(i, 1); score += 50; }
        }
        document.getElementById('s2').innerText = `Score: ${score}`;
        loop = requestAnimationFrame(loop2);
    }

    // --- GAME 3: 별 수집가 ---
    const c3 = document.getElementById('c3'), ctx3 = c3.getContext('2d');
    let tx3 = 50, stars3 = [];
    function initG3() {
        c3.width = c3.offsetWidth; c3.height = c3.offsetHeight;
        active = true; score = 0; stars3 = [];
        document.getElementById('ov3').style.display = 'none';
        itv = setInterval(() => { if(active) stars3.push({x: Math.random()*c3.width, y: -20}) }, 600);
        loop3();
    }
    function loop3() {
        if(!active) return;
        ctx3.clearRect(0,0,c3.width, c3.height);
        drawToru(ctx3, tx3, c3.height-15);
        for(let i=stars3.length-1; i>=0; i--) {
            let s = stars3[i]; s.y += 2.5;
            ctx3.fillStyle = "#fbc531"; ctx3.beginPath(); ctx3.arc(s.x, s.y, 5, 0, Math.PI*2); ctx3.fill();
            if(Math.hypot(s.x-tx3, s.y-(c3.height-15)) < 18) { score += 20; stars3.splice(i, 1); }
            else if(s.y > c3.height) stars3.splice(i, 1);
        }
        document.getElementById('s3').innerText = `Score: ${score}`;
        loop = requestAnimationFrame(loop3);
    }
    c3.onmousemove = e => tx3 = e.offsetX;

    // --- GAME 4: 방울 팡팡 ---
    const c4 = document.getElementById('c4'), ctx4 = c4.getContext('2d');
    let bubbles4 = [];
    function initG4() {
        c4.width = c4.offsetWidth; c4.height = c4.offsetHeight;
        active = true; score = 0; bubbles4 = [];
        document.getElementById('ov4').style.display = 'none';
        itv = setInterval(() => { if(active) bubbles4.push({x: Math.random()*c4.width, y: c4.height+10, r: 12}) }, 500);
        loop4();
    }
    function loop4() {
        if(!active) return;
        ctx4.clearRect(0,0,c4.width, c4.height);
        for(let i=bubbles4.length-1; i>=0; i--) {
            let b = bubbles4[i]; b.y -= 1.5;
            ctx4.strokeStyle = "#74b9ff"; ctx4.lineWidth = 2; ctx4.beginPath(); ctx4.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx4.stroke();
            if(b.y < -20) bubbles4.splice(i, 1);
        }
        document.getElementById('s4').innerText = `Score: ${score}`;
        loop = requestAnimationFrame(loop4);
    }
    c4.onmousedown = e => {
        const rect = c4.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        for(let i=bubbles4.length-1; i>=0; i--) {
            if(Math.hypot(mx-bubbles4[i].x, my-bubbles4[i].y) < bubbles4[i].r) { bubbles4.splice(i, 1); score += 10; }
        }
    };
</script>
</body>
</html>
